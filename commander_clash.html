<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Commander Clash</title>
<style>
/* ── [#6] iPhone zoom & text selection lock ── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;touch-action:none;}
html,body{margin:0;overflow:hidden;background:#0a0a0f;
  font-family:'Segoe UI',system-ui,sans-serif;
  touch-action:none;-webkit-text-size-adjust:none;}
canvas{display:block;touch-action:none;}

#header{position:absolute;top:0;left:0;right:0;height:56px;
  background:linear-gradient(180deg,#070710 0%,rgba(7,7,16,.94)100%);
  color:#fff;display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;z-index:100;border-bottom:2px solid #1e2d4a;
  box-shadow:0 2px 20px rgba(0,0,0,.9);}
.hdr{display:flex;flex-direction:column;align-items:center;min-width:68px;}
.hlabel{font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:1.5px;}
.hval{font-size:21px;font-weight:900;line-height:1;}
#pScore{color:#4fc3f7;}#eScore{color:#ff5252;}#tDisp{color:#ffd54f;}#gDisp{color:#81c784;}
.hcenter{display:flex;gap:14px;align-items:center;}

#ui{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#060810 0%,rgba(6,8,14,.97)100%);
  padding:8px 6px 12px;z-index:100;border-top:2px solid #1e2d4a;}
#cardRow{display:flex;gap:6px;align-items:center;justify-content:center;margin-bottom:5px;}

.tc{width:68px;height:86px;border-radius:10px;border:2px solid #252535;
  background:linear-gradient(155deg,#151828,#0c0f1e);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;position:relative;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  flex-shrink:0;touch-action:manipulation;}
.tc:active{transform:scale(.92);}
.tc.active{border-color:#4fc3f7;box-shadow:0 0 16px #4fc3f780;
  background:linear-gradient(155deg,#0d2540,#091830);}
/* [#4] Drag-to-offhand: glow when dragging over offhand */
.tc.dragging{opacity:.5;transform:scale(.88);}
.tc .ce{font-size:24px;line-height:1.1;}
.tc .cn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;opacity:.8;}
.tc .cc{font-size:11px;color:#ffd54f;font-weight:900;}
.tc .cd{font-size:7px;opacity:.45;text-align:center;padding:0 3px;}

/* [#4] Floating drag ghost card */
#dragGhost{position:fixed;pointer-events:none;z-index:300;display:none;
  width:68px;height:86px;border-radius:10px;border:2px solid #4fc3f7;
  background:linear-gradient(155deg,#0d2540,#091830);color:#fff;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:11px;opacity:.9;box-shadow:0 0 20px #4fc3f760;}

#offhand{width:56px;height:74px;border-radius:8px;border:2px dashed #2a3050;
  background:rgba(255,255,255,.03);color:#888;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;cursor:pointer;
  font-size:9px;text-align:center;flex-shrink:0;position:relative;
  transition:border-color .15s,background .15s,box-shadow .15s;}
#offhand.has{border-color:#7c4dff;background:rgba(124,77,255,.1);}
/* [#4] Offhand glows when valid drag target */
#offhand.dropready{border-color:#4fc3f7;background:rgba(79,195,247,.15);
  box-shadow:0 0 18px #4fc3f780;}
#offhand .oe{font-size:20px;}
#offhand .ol{font-size:7px;position:absolute;top:3px;opacity:.4;}

#uibot{display:flex;gap:6px;align-items:center;justify-content:center;}
#deckinfo{font-size:11px;color:#666;}
/* [#5] Cycle hand button */
#cycleBtn{padding:4px 10px;font-size:11px;font-weight:700;
  background:linear-gradient(145deg,#1a2540,#0f1830);
  color:#7ec8e3;border:1.5px solid #2a4060;border-radius:8px;cursor:pointer;
  touch-action:manipulation;flex-shrink:0;}
#cycleBtn:active{transform:scale(.93);background:linear-gradient(145deg,#223050,#182240);}

#banner{position:absolute;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.88);color:#fff;padding:7px 18px;border-radius:18px;
  font-size:12px;display:none;z-index:99;white-space:nowrap;
  border:1.5px solid #444;box-shadow:0 3px 12px rgba(0,0,0,.6);}
#hprev{position:absolute;pointer-events:none;z-index:98;display:none;
  flex-direction:column;align-items:center;background:rgba(0,0,0,.88);
  border:2px solid #4fc3f7;border-radius:10px;padding:7px 12px;color:#fff;font-size:11px;gap:2px;}
#hprev .hpe{font-size:26px;}
#end{display:none;position:absolute;inset:0;background:rgba(0,0,0,.97);color:#fff;
  justify-content:center;align-items:center;flex-direction:column;z-index:200;padding:20px;}
#end h1{font-size:42px;margin:8px 0;text-shadow:0 0 20px currentColor;}
#endStats{font-size:18px;margin:12px 0;text-align:center;line-height:1.9;}
#replayBtn{padding:15px 34px;font-size:18px;
  background:linear-gradient(145deg,#4CAF50,#2E7D32);
  color:#fff;border:none;border-radius:12px;margin-top:20px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>
<div id="header">
  <div class="hdr"><span class="hlabel">🏴 YOU</span><span class="hval" id="pScore">0%</span></div>
  <div class="hcenter">
    <div class="hdr"><span class="hlabel">⏱ TIME</span><span class="hval" id="tDisp">180</span></div>
    <div class="hdr"><span class="hlabel">💰 GOLD</span><span class="hval" id="gDisp">15</span></div>
  </div>
  <div class="hdr"><span class="hlabel">☠️ ENEMY</span><span class="hval" id="eScore">0%</span></div>
</div>
<div id="banner"></div>
<div id="hprev"><div class="hpe" id="hpe"></div><div id="hpn" style="font-weight:800"></div><div id="hpi" style="font-size:9px;opacity:.65"></div></div>

<!-- [#4] Drag ghost element -->
<div id="dragGhost"></div>

<canvas id="game"></canvas>
<div id="ui">
  <div id="cardRow">
    <div id="offhand"><span class="ol">HOLD</span><div class="oe" id="oe">🤚</div><div id="on" style="font-size:7px;opacity:.6"></div></div>
    <div class="tc" id="c0"></div>
    <div class="tc" id="c1"></div>
    <div class="tc" id="c2"></div>
  </div>
  <div id="uibot">
    <span id="deckinfo">🃏 --</span>
    <!-- [#5] Cycle hand button -->
    <button id="cycleBtn" title="Discard hand and draw 3 new cards">⟳ NEW HAND</button>
    <span style="font-size:9px;color:#444">Hold to preview</span>
  </div>
</div>
<div id="end">
  <h1 id="endTitle">⚔️</h1>
  <div id="endStats"></div>
  <button id="replayBtn" onclick="location.reload()">🔄 PLAY AGAIN</button>
</div>

<script>
// ═══════════════════════════════════════════════════
// CANVAS & LAYOUT
// ═══════════════════════════════════════════════════
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const HEADER_H=56;
const MAP_W=20,MAP_H=36;
let UI_H=108;
function W(){return canvas.width;}
function H(){return canvas.height;}
function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  UI_H=document.getElementById("ui").offsetHeight||108;
}
resize();
window.addEventListener("resize",resize);
function TS(){return Math.floor((H()-HEADER_H-UI_H)/MAP_H);}
function OX(){return Math.floor((W()-MAP_W*TS())/2);}
function OT(){return HEADER_H;}

// ═══════════════════════════════════════════════════
// TERRAIN
// ═══════════════════════════════════════════════════
const T_PLAINS=0,T_MOUNTAIN=1,T_RIVER=2,T_FOREST=3,T_DESERT=4;
let terrain=[],mapOwn=[],fog=[];
let buildings=[],mines=[];
const TDATA={
  [T_PLAINS]:  {color:"#6a7d55",icon:"",  speedMult:1.0, defBonus:0.0, atkBonus:1.0},
  [T_MOUNTAIN]:{color:"#7a7060",icon:"⛰", speedMult:0.45,defBonus:0.55,atkBonus:1.4},
  [T_RIVER]:   {color:"#2e5f9a",icon:"🌊", speedMult:0.5, defBonus:-0.2,atkBonus:0.9},
  [T_FOREST]:  {color:"#2c5225",icon:"🌲", speedMult:0.75,defBonus:0.35,atkBonus:1.0},
  [T_DESERT]:  {color:"#b89a5a",icon:"",  speedMult:0.85,defBonus:0.0, atkBonus:1.0},
};
function initTerrain(){
  terrain=[];mapOwn=[];fog=[];
  for(let y=0;y<MAP_H;y++){
    let tr=[],mo=[],fg=[];
    for(let x=0;x<MAP_W;x++){tr.push(T_PLAINS);mo.push(0);fg.push(false);}
    terrain.push(tr);mapOwn.push(mo);fog.push(fg);
  }
  const mGroups=[{cx:4,cy:10,r:3},{cx:6,cy:13,r:2},{cx:15,cy:8,r:2},{cx:3,cy:20,r:2},{cx:16,cy:22,r:3},{cx:14,cy:25,r:2}];
  for(let m of mGroups){
    for(let dy=-m.r;dy<=m.r;dy++)for(let dx=-m.r;dx<=m.r;dx++)
      if(Math.hypot(dx,dy)<=m.r){let nx=m.cx+dx,ny=m.cy+dy;if(inM(nx,ny))terrain[ny][nx]=T_MOUNTAIN;}
  }
  let rx=7,ry=1;
  for(let i=0;i<20;i++){if(inM(rx,ry))terrain[ry][rx]=T_RIVER;ry++;rx+=Math.sin(i*.9)>.3?1:Math.sin(i*.9)<-.3?-1:0;rx=clamp(rx,1,MAP_W-2);}
  rx=12;ry=14;
  for(let i=0;i<18;i++){if(inM(rx,ry))terrain[ry][rx]=T_RIVER;ry++;rx+=Math.cos(i*1.1)>.3?1:Math.cos(i*1.1)<-.3?-1:0;rx=clamp(rx,1,MAP_W-2);}
  const fGroups=[{cx:12,cy:7,r:2},{cx:3,cy:26,r:2},{cx:17,cy:29,r:2},{cx:10,cy:18,r:2}];
  for(let f of fGroups){
    for(let dy=-f.r;dy<=f.r;dy++)for(let dx=-f.r;dx<=f.r;dx++)
      if(Math.hypot(dx,dy)<=f.r){let nx=f.cx+dx,ny=f.cy+dy;if(inM(nx,ny)&&terrain[ny][nx]===T_PLAINS)terrain[ny][nx]=T_FOREST;}
  }
  for(let x=0;x<MAP_W;x++){let y=Math.floor(MAP_H/2);if(terrain[y][x]===T_PLAINS)terrain[y][x]=T_DESERT;if(terrain[y-1]&&terrain[y-1][x]===T_PLAINS)terrain[y-1][x]=T_DESERT;}
  for(let y=MAP_H-8;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){mapOwn[y][x]=1;fog[y][x]=true;}
  for(let y=0;y<8;y++)for(let x=0;x<MAP_W;x++){mapOwn[y][x]=-1;fog[y][x]=true;}
}
function inM(x,y){return x>=0&&x<MAP_W&&y>=0&&y<MAP_H;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function worldToTile(wx,wy){return{tx:Math.floor((wx-OX())/TS()),ty:Math.floor((wy-OT())/TS())};}
function tileToWorld(tx,ty){return{wx:OX()+tx*TS()+TS()/2,wy:OT()+ty*TS()+TS()/2};}

// ═══════════════════════════════════════════════════
// BUILDINGS
// ═══════════════════════════════════════════════════
const BTYPES={
  barracks:  {emoji:"🏯",hp:80, name:"Barracks", effect:"Shelter + gold boost"},
  watchtower:{emoji:"🗼",hp:50, name:"Watchtower",effect:"Reveals 5-tile fog"},
  fortress:  {emoji:"🏰",hp:150,name:"Fortress",  effect:"Heavy shelter -55% dmg"},
  armory:    {emoji:"⚙️", hp:60, name:"Armory",    effect:"+25% attack nearby"},
  goldmine:  {emoji:"⛏️", hp:40, name:"Gold Mine", effect:"+2 gold/sec if manned"},
};
function initBuildings(){
  buildings=[];
  const bkeys=Object.keys(BTYPES);
  let tries=0;
  while(buildings.length<13&&tries<300){
    tries++;
    let bx=1+Math.floor(Math.random()*(MAP_W-2));
    let by=4+Math.floor(Math.random()*(MAP_H-10));
    if(terrain[by][bx]===T_RIVER||terrain[by][bx]===T_MOUNTAIN)continue;
    if(buildings.some(b=>b.x===bx&&b.y===by))continue;
    let t=bkeys[Math.floor(Math.random()*bkeys.length)];
    buildings.push({x:bx,y:by,type:t,hp:BTYPES[t].hp,maxHp:BTYPES[t].hp,team:0});
  }
}

// ═══════════════════════════════════════════════════
// TROOP DEFINITIONS
// ═══════════════════════════════════════════════════
const TROOPS=[
  {id:"soldier",   name:"Soldier",    emoji:"🪖",cost:1, count:1,hp:12,range:110,damage:4, speed:.65,desc:"Basic infantry"},
  {id:"squad",     name:"Squad",      emoji:"👥",cost:4, count:5,hp:8, range:110,damage:3, speed:.55,desc:"5-man fire squad"},
  {id:"sniper",    name:"Sniper",     emoji:"🎯",cost:3, count:1,hp:7, range:250,damage:12,speed:.45,desc:"Long-range precision"},
  {id:"tank",      name:"Tank",       emoji:"🚛",cost:9, count:1,hp:90,range:130,damage:16,speed:.30,desc:"Heavy armored unit"},
  {id:"mortar",    name:"Mortar",     emoji:"💣",cost:8, count:1,hp:14,range:200,damage:18,speed:.20,desc:"Area bombardment"},
  {id:"cavalry",   name:"Cavalry",    emoji:"🏇",cost:5, count:2,hp:18,range:90, damage:9, speed:1.15,desc:"Fast flanking unit"},
  {id:"medic",     name:"Medic",      emoji:"💉",cost:4, count:1,hp:10,range:80, damage:0, speed:.55,desc:"Heals nearby allies"},
  {id:"engineer",  name:"Engineer",   emoji:"🔧",cost:3, count:1,hp:8, range:80, damage:2, speed:.50,desc:"Repairs buildings"},
  {id:"rocket",    name:"Rocket",     emoji:"🚀",cost:7, count:1,hp:14,range:220,damage:22,speed:.35,desc:"Explosive anti-tank"},
  {id:"shield",    name:"Shield Wall",emoji:"🛡️",cost:5, count:3,hp:38,range:70, damage:3, speed:.30,desc:"Tanky defensive line"},
  {id:"berserker", name:"Berserker",  emoji:"🪓",cost:6, count:2,hp:24,range:65, damage:20,speed:.95,desc:"Melee fury"},
  {id:"artillery", name:"Artillery",  emoji:"🔫",cost:10,count:1,hp:20,range:270,damage:24,speed:.15,desc:"Max-range cannon"},
  {id:"paratrooper",name:"Para",      emoji:"🪂",cost:6, count:3,hp:12,range:110,damage:5, speed:.60,desc:"Drop anywhere"},
  {id:"spy",       name:"Scout Plane",emoji:"🛩️",cost:3, count:0,hp:0, range:0,  damage:0, speed:0,  desc:"Reveals enemy fog"},
  {id:"airstrike", name:"Airstrike",  emoji:"✈️",cost:12,count:0,hp:0, range:0,  damage:0, speed:0,  desc:"Drag to bomb a line"},
  {id:"mine",      name:"Land Mine",  emoji:"⚠️",cost:2, count:0,hp:0, range:0,  damage:0, speed:0,  desc:"Place near your troops"},
];
const TMAP={};for(let t of TROOPS)TMAP[t.id]=t;

// ═══════════════════════════════════════════════════
// DECK / HAND
// ═══════════════════════════════════════════════════
let deck=[],hand=[],offhandCard=null,deckIdx=0;
function buildDeck(){
  let pool=TROOPS.filter(t=>!["spy","airstrike","mine"].includes(t.id));
  deck=[];
  for(let t of pool){let n=t.cost<=3?3:t.cost<=6?2:1;for(let i=0;i<n;i++)deck.push({...t});}
  deck.push({...TMAP.spy},{...TMAP.airstrike},{...TMAP.mine},{...TMAP.airstrike});
  shuffleDeck();
  hand=[];offhandCard=null;deckIdx=0;
  for(let i=0;i<3;i++)drawCard();
  renderHand();
}
function shuffleDeck(){
  for(let i=deck.length-1;i>0;i--){let j=0|Math.random()*(i+1);[deck[i],deck[j]]=[deck[j],deck[i]];}
}
function drawCard(){
  if(hand.length>=3)return;
  if(deckIdx>=deck.length){shuffleDeck();deckIdx=0;}
  hand.push({...deck[deckIdx++]});
}
function consumeCard(i){
  if(i===-99){let c=offhandCard;offhandCard=null;renderHand();return c;}
  let c=hand[i];hand.splice(i,1);drawCard();renderHand();return c;
}
function storeOffhand(i){
  if(offhandCard)return false;
  offhandCard=hand[i];hand.splice(i,1);drawCard();renderHand();return true;
}

// [#5] Cycle hand: discard all 3, draw fresh 3
function cycleHand(){
  hand=[];
  if(deckIdx+3>deck.length){shuffleDeck();deckIdx=0;}
  for(let i=0;i<3;i++)drawCard();
  placing=null;placingIdx=-1;
  renderHand();updateBanner();
  flashBanner("🔄 New hand drawn!",1200);
}

function renderHand(){
  for(let i=0;i<3;i++){
    let el=document.getElementById("c"+i);
    let card=hand[i];
    if(!card){el.innerHTML="";el.className="tc";el.style.opacity="0.15";el.style.pointerEvents="none";continue;}
    el.style.pointerEvents="";
    let isActive=placing&&placingIdx===i;
    el.className="tc"+(isActive?" active":"");
    el.style.opacity=gold<card.cost?"0.35":"1";
    el.innerHTML=`<div class="ce">${card.emoji}</div><div class="cn">${card.name}</div><div class="cc">💰${card.cost}</div><div class="cd">${card.desc}</div>`;
  }
  let oh=document.getElementById("offhand");
  let oe=document.getElementById("oe");
  let on2=document.getElementById("on");
  if(offhandCard){oh.classList.add("has");oe.textContent=offhandCard.emoji;on2.textContent=offhandCard.name;}
  else{oh.classList.remove("has");oe.textContent="🤚";on2.textContent="";}
  document.getElementById("deckinfo").textContent="🃏 "+(deck.length-deckIdx)+" left";
}

// ═══════════════════════════════════════════════════
// [#4] DRAG CARD TO OFFHAND
// ═══════════════════════════════════════════════════
let cardDrag={active:false,idx:-1,card:null,startX:0,startY:0};
const ghost=document.getElementById("dragGhost");

function startCardDrag(idx,clientX,clientY){
  if(!hand[idx])return;
  cardDrag={active:true,idx,card:hand[idx],startX:clientX,startY:clientY};
  ghost.innerHTML=`<div style="font-size:24px">${hand[idx].emoji}</div><div style="font-size:8px;font-weight:700">${hand[idx].name}</div><div style="font-size:11px;color:#ffd54f">💰${hand[idx].cost}</div>`;
  ghost.style.display="flex";
  ghost.style.left=(clientX-34)+"px";
  ghost.style.top=(clientY-43)+"px";
  document.getElementById("c"+idx).classList.add("dragging");
}
function moveCardDrag(clientX,clientY){
  if(!cardDrag.active)return;
  ghost.style.left=(clientX-34)+"px";
  ghost.style.top=(clientY-43)+"px";
  // Highlight offhand if hovering over it
  let oh=document.getElementById("offhand");
  let r=oh.getBoundingClientRect();
  let over=clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom;
  oh.classList.toggle("dropready",over&&!offhandCard);
}
function endCardDrag(clientX,clientY){
  if(!cardDrag.active)return;
  ghost.style.display="none";
  document.getElementById("c"+cardDrag.idx).classList.remove("dragging");
  document.getElementById("offhand").classList.remove("dropready");
  let oh=document.getElementById("offhand");
  let r=oh.getBoundingClientRect();
  let over=clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom;
  if(over&&!offhandCard){
    storeOffhand(cardDrag.idx);
    flashBanner("📦 Stored "+cardDrag.card.name+" in offhand",1500);
  }
  // else card snaps back (no-op, DOM unchanged)
  cardDrag.active=false;
}

// ═══════════════════════════════════════════════════
// [#1][#2][#3] CARD & MAP INPUT
// ═══════════════════════════════════════════════════
let placing=null,placingIdx=-1;
let selected=null,dragStart=null,lastPointer=null;

// [#3] Hold-and-swirl state
const SWIRL={
  active:false,     // gesture in progress
  x:0,y:0,          // finger anchor
  candidates:[],    // friendly squads in zone
  cycleIdx:0,       // which candidate is highlighted
  downTime:0,       // when finger went down
  zoneVisible:false,// show the 80px circle
  lastAngle:0,      // for cycle detection
  totalRotation:0,  // accumulated angle for cycling
  degreesPerStep:45,// rotate this much to advance one candidate
  cancelled:false,
};
const SWIRL_RADIUS=80;
const SWIRL_HOLD_MS=350;

// Per-card listeners
for(let i=0;i<3;i++){
  (()=>{
    let idx=i;
    let el=document.getElementById("c"+i);
    let holdT=null,didHold=false,dragMoved=false;
    el.addEventListener("pointerdown",e=>{
      e.stopPropagation();
      didHold=false;dragMoved=false;
      let {clientX,clientY}=e.touches?e.touches[0]:e;
      holdT=setTimeout(()=>{didHold=true;let c=hand[idx];if(c)showPreview(c,e);},400);
      startCardDrag(idx,clientX,clientY);
    });
    el.addEventListener("pointermove",e=>{
      e.stopPropagation();
      let {clientX,clientY}=e.touches?e.touches[0]:e;
      let dx=clientX-cardDrag.startX,dy=clientY-cardDrag.startY;
      if(Math.hypot(dx,dy)>8){dragMoved=true;clearTimeout(holdT);}
      moveCardDrag(clientX,clientY);
    });
    el.addEventListener("pointerup",e=>{
      e.stopPropagation();
      clearTimeout(holdT);hidePreview();
      let {clientX,clientY}=e.changedTouches?e.changedTouches[0]:e;
      endCardDrag(clientX,clientY);
      if(didHold||dragMoved)return;
      // Short tap = select card
      let card=hand[idx];if(!card)return;
      if(placing&&placingIdx===idx){placing=null;placingIdx=-1;renderHand();updateBanner();return;}
      if(gold<card.cost){flashBanner("❌ Need 💰"+card.cost+" — have "+Math.floor(gold),1500);return;}
      placing=card;placingIdx=idx;selected=null;dragStart=null;
      renderHand();updateBanner();
    });
    el.addEventListener("pointerleave",e=>{
      clearTimeout(holdT);hidePreview();
      let {clientX,clientY}=e.changedTouches?e.changedTouches[0]:e;
      moveCardDrag(clientX,clientY);
    });
    el.addEventListener("contextmenu",e=>{
      e.preventDefault();e.stopPropagation();
      if(hand[idx]&&!offhandCard){let n=hand[idx].name;storeOffhand(idx);flashBanner("📦 Stored "+n+" in offhand",1800);}
    });
  })();
}

function getPos(e){
  let r=canvas.getBoundingClientRect();
  let src=e.touches?e.touches[0]:e.changedTouches?e.changedTouches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}

// ─── Canvas pointer events ─────────────────────────
canvas.addEventListener("pointerdown",e=>{
  e.preventDefault();
  let p=getPos(e);lastPointer=p;

  // Airstrike drag
  if(placing&&placing.id==="airstrike"){dragStart=p;return;}

  // Skip swirl gesture if placing a card
  if(!placing){
    // [#3] BEGIN hold-swirl detection
    SWIRL.active=false;SWIRL.cancelled=false;SWIRL.zoneVisible=false;
    SWIRL.x=p.x;SWIRL.y=p.y;SWIRL.downTime=Date.now();
    SWIRL.candidates=[];SWIRL.cycleIdx=0;SWIRL.totalRotation=0;SWIRL.lastAngle=0;

    // [#2] Tap priority: if a squad is selected, first tap sets POI unless inside 60px ring
    if(selected&&selected.team==="player"&&selected.members.length){
      let c=selected.center();
      let dist=Math.hypot(c.x-p.x,c.y-p.y);
      if(dist>60){
        // Outside selected squad radius → set new POI immediately
        selected.poi={x:p.x,y:p.y};
        updateBanner();
        return;
      }
      // Inside radius → allow swirl detection to possibly cycle, but don't reset POI yet
    }

    // Start swirl timer
    SWIRL._timer=setTimeout(()=>{
      if(SWIRL.cancelled)return;
      // Collect candidate squads within SWIRL_RADIUS
      let cands=squads.filter(s=>s.team==="player"&&s.members.length);
      // If selected squad exists, prefer squads near it first
      if(selected&&selected.team==="player"&&selected.members.length){
        let sc=selected.center();
        cands=cands.sort((a,b)=>{
          let da=Math.hypot(a.center().x-sc.x,a.center().y-sc.y);
          let db=Math.hypot(b.center().x-sc.x,b.center().y-sc.y);
          return da-db;
        });
      }
      cands=cands.filter(s=>{
        let c=s.center();
        return Math.hypot(c.x-SWIRL.x,c.y-SWIRL.y)<SWIRL_RADIUS;
      });
      if(!cands.length)return; // no squads in zone, don't activate
      SWIRL.active=true;SWIRL.zoneVisible=true;
      SWIRL.candidates=cands;
      // Start on nearest or currently selected
      let startIdx=0;
      if(selected){let si=cands.indexOf(selected);if(si>=0)startIdx=si;}
      SWIRL.cycleIdx=startIdx;
    },SWIRL_HOLD_MS);
    return;
  }
});

canvas.addEventListener("pointermove",e=>{
  e.preventDefault();
  let p=getPos(e);lastPointer=p;

  // [#3] Swirl cycle logic
  if(SWIRL.active&&SWIRL.zoneVisible){
    let dx=p.x-SWIRL.x,dy=p.y-SWIRL.y;
    let dist=Math.hypot(dx,dy);
    // If finger leaves the zone circle, cancel
    if(dist>SWIRL_RADIUS+20){SWIRL.active=false;SWIRL.cancelled=true;SWIRL.zoneVisible=false;return;}
    // Track angle for cycle detection
    let angle=Math.atan2(dy,dx)*(180/Math.PI);
    if(SWIRL.lastAngle!==0&&SWIRL.candidates.length>1){
      let delta=angle-SWIRL.lastAngle;
      // Normalize to [-180,180]
      if(delta>180)delta-=360;if(delta<-180)delta+=360;
      SWIRL.totalRotation+=delta;
      // Advance cycle when enough rotation accumulated
      let steps=Math.floor(Math.abs(SWIRL.totalRotation)/SWIRL.degreesPerStep);
      if(steps>0){
        let dir=SWIRL.totalRotation>0?1:-1;
        SWIRL.cycleIdx=(SWIRL.cycleIdx+dir*steps+SWIRL.candidates.length)%SWIRL.candidates.length;
        SWIRL.totalRotation-=dir*steps*SWIRL.degreesPerStep;
      }
    }
    SWIRL.lastAngle=angle;
    return;
  }

  // [#3] If hold timer running but finger moved far, cancel it
  if(!SWIRL.active&&SWIRL._timer){
    let dist=Math.hypot(p.x-SWIRL.x,p.y-SWIRL.y);
    if(dist>15){clearTimeout(SWIRL._timer);SWIRL.cancelled=true;}
  }

  if(placing)showInlinePrev(p);
});

canvas.addEventListener("pointerup",e=>{
  e.preventDefault();
  let p=getPos(e);
  clearTimeout(SWIRL._timer);
  hideInlinePrev();

  // [#3] Swirl release: commit highlighted candidate as selected
  if(SWIRL.active&&SWIRL.zoneVisible){
    SWIRL.zoneVisible=false;SWIRL.active=false;
    if(SWIRL.candidates.length){
      selected=SWIRL.candidates[SWIRL.cycleIdx];
      updateBanner();
    }
    return;
  }
  SWIRL.active=false;SWIRL.zoneVisible=false;

  // Airstrike drag release
  if(dragStart&&placing&&placing.id==="airstrike"){
    if(Math.hypot(p.x-dragStart.x,p.y-dragStart.y)>30&&gold>=placing.cost){
      gold-=placing.cost;consumeCard(placingIdx);doAirstrike(dragStart,p);
    }
    dragStart=null;placing=null;placingIdx=-1;renderHand();updateBanner();return;
  }

  if(placing){
    let{tx,ty}=worldToTile(p.x,p.y);
    if(!inM(tx,ty))return;
    if(gold<placing.cost){flashBanner("❌ Not enough gold!",1500);return;}
    if(placing.id==="mine"){
      let ok=soldiers.some(s=>{
        if(s.team!=="player"||s.hp<=0)return false;
        let{tx:stx,ty:sty}=worldToTile(s.x,s.y);
        return Math.hypot(stx-tx,sty-ty)<=4;
      });
      if(!ok){flashBanner("⚠️ Place mines within 4 tiles of your troops!",2000);return;}
      gold-=placing.cost;consumeCard(placingIdx);
      mines.push({x:tx,y:ty,team:"player",triggered:false});
      placing=null;placingIdx=-1;renderHand();updateBanner();return;
    }
    if(placing.id==="spy"){
      gold-=placing.cost;consumeCard(placingIdx);spyPlane=new SpyPlane();
      placing=null;placingIdx=-1;renderHand();updateBanner();return;
    }
    if(placing.id!=="paratrooper"&&mapOwn[ty][tx]===-1){flashBanner("❌ Can't place on enemy territory!",1500);return;}
    gold-=placing.cost;
    let cls=consumeCard(placingIdx);
    let sq=new Squad(p.x,p.y,"player",cls);
    squads.push(sq);selected=sq;
    placing=null;placingIdx=-1;renderHand();updateBanner();
    return;
  }

  // [#2] No placing: handle squad selection / movement
  if(!SWIRL.cancelled){
    // If selected squad, a quick tap outside its 60px ring already sent POI on pointerdown
    // This handles the "select new squad" case if no current selection
    if(!selected){
      for(let s of squads){
        if(s.team!=="player"||!s.members.length)continue;
        let c=s.center();
        if(Math.hypot(c.x-p.x,c.y-p.y)<44){selected=s;updateBanner();return;}
      }
    } else {
      // Selected exists: tap inside 60px ring → try to select another squad nearby
      let sc=selected.center();
      if(Math.hypot(sc.x-p.x,sc.y-p.y)<=60){
        for(let s of squads){
          if(s.team!=="player"||s===selected||!s.members.length)continue;
          let c=s.center();
          if(Math.hypot(c.x-p.x,c.y-p.y)<44){selected=s;updateBanner();return;}
        }
        // Tap inside ring but no other squad → set POI
        selected.poi={x:p.x,y:p.y};updateBanner();
      }
      // Tap outside ring → POI already set on pointerdown
    }
  }
  SWIRL.cancelled=false;
});

// ═══════════════════════════════════════════════════
// AIRSTRIKE
// ═══════════════════════════════════════════════════
function doAirstrike(start,end){
  let dx=end.x-start.x,dy=end.y-start.y;
  let steps=clamp(Math.floor(Math.hypot(dx,dy)/48)+2,2,12);
  for(let i=0;i<=steps;i++){
    let t=i/steps,px=start.x+dx*t,py=start.y+dy*t;
    for(let s of soldiers){
      if(s.team==="player"||s.hp<=0)continue;
      if(ptLineDist(s.x,s.y,start.x,start.y,end.x,end.y)<85)
        s.hp-=(20+Math.random()*14)*(s.inShelter?.5:1);
    }
    for(let k=0;k<5;k++){
      let rx=px+(Math.random()-.5)*100,ry=py+(Math.random()-.5)*65;
      bullets.push(new Bullet(rx-180,ry-250,rx,ry,"#ff8030",true));
    }
    explosions.push(new Explosion(px,py,true));
  }
}
function ptLineDist(px,py,x1,y1,x2,y2){
  let A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;
  let t2=Math.max(0,Math.min(1,(A*C+B*D)/(C*C+D*D||1)));
  return Math.hypot(px-x1-t2*C,py-y1-t2*D);
}

// ═══════════════════════════════════════════════════
// BULLETS & EXPLOSIONS
// ═══════════════════════════════════════════════════
let bullets=[],explosions=[];
class Bullet{
  constructor(x,y,tx,ty,col="#4fc3f7",big=false){
    this.x=x;this.y=y;this.tx=tx;this.ty=ty;this.life=14;this.col=col;this.big=big;
  }
  update(){this.x+=(this.tx-this.x)*.28;this.y+=(this.ty-this.y)*.28;this.life--;}
  draw(){ctx.strokeStyle=this.col;ctx.lineWidth=this.big?3.5:1.8;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.tx,this.ty);ctx.stroke();}
}
class Explosion{
  constructor(x,y,big=false){this.x=x;this.y=y;this.life=26;this.max=26;this.big=big;}
  update(){this.life--;}
  draw(){
    let p=this.life/this.max,r=(this.max-this.life)*(this.big?7:4);
    ctx.fillStyle=`rgba(255,${0|140*p},0,${p*.75})`;ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,120,${p*.5})`;ctx.beginPath();ctx.arc(this.x,this.y,r*.45,0,Math.PI*2);ctx.fill();
  }
}

// ═══════════════════════════════════════════════════
// SPY PLANE
// ═══════════════════════════════════════════════════
let spyPlane=null;
class SpyPlane{
  constructor(){this.x=W()/2;this.y=H()-100;this.phase=0;this.timer=360;this.state="up";}
  update(){
    this.timer--;if(this.timer<=0){spyPlane=null;return;}
    this.phase+=.02;
    if(this.state==="up"){this.y-=2;this.x+=Math.sin(this.phase);if(this.y<OT()+TS()*5)this.state="circle";}
    else{this.x=W()/2+Math.cos(this.phase)*130;this.y=OT()+TS()*4+Math.sin(this.phase*.7)*30;}
    let{tx,ty}=worldToTile(this.x,this.y);
    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){let nx=tx+dx,ny=ty+dy;if(inM(nx,ny))fog[ny][nx]=true;}
  }
  draw(){
    ctx.font="28px Arial";ctx.textAlign="center";ctx.fillText("🛩️",this.x,this.y);
    ctx.fillStyle="rgba(255,255,255,.75)";ctx.font="10px Arial";
    ctx.fillText("⛽"+Math.ceil(this.timer/20)+"s",this.x,this.y-20);
  }
}

// ═══════════════════════════════════════════════════
// SOLDIER CLASS
// ═══════════════════════════════════════════════════
class Soldier{
  constructor(x,y,team,cls){
    this.x=x;this.y=y;this.team=team;this.cls=cls;
    this.hp=cls.hp;this.range=cls.range;this.damage=cls.damage;
    this.speed=cls.speed||1.2;this.cool=0;this.kills=0;
    this.inShelter=false;this.terType=T_PLAINS;
  }
  getTile(){return worldToTile(this.x,this.y);}
  update(){
    this.cool=Math.max(0,this.cool-1);
    let{tx,ty}=this.getTile();
    this.terType=inM(tx,ty)?terrain[ty][tx]:T_PLAINS;
    this.inShelter=false;
    for(let b of buildings){
      if(b.x===tx&&b.y===ty&&(b.type==="fortress"||b.type==="barracks")){this.inShelter=true;break;}
    }
  }
  draw(){
    let big=["tank","artillery"].includes(this.cls.id);
    let sz=big?26:18;
    ctx.font=sz+"px Arial";ctx.textAlign="center";
    ctx.fillStyle="rgba(0,0,0,.4)";ctx.fillText(this.cls.emoji,this.x+1,this.y+sz/3+1);
    ctx.fillText(this.cls.emoji,this.x,this.y+sz/3);
    let bw=20,hp=this.hp/this.cls.hp;
    ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(this.x-bw/2-1,this.y-sz/2-8,bw+2,5);
    ctx.fillStyle=hp>.6?"#4caf50":hp>.3?"#ffc107":"#f44336";
    ctx.fillRect(this.x-bw/2,this.y-sz/2-7,bw*hp,3);
    ctx.fillStyle=this.team==="player"?"#4fc3f7":"#ff5252";
    ctx.beginPath();ctx.arc(this.x,this.y-sz/2-11,2.5,0,Math.PI*2);ctx.fill();
  }
}

// ═══════════════════════════════════════════════════
// SQUAD CLASS
// ═══════════════════════════════════════════════════
class Squad{
  constructor(x,y,team,cls){
    this.team=team;this.cls=cls;this.poi={x,y};
    this.members=[];this.kills=0;this._bcool=0;
    let n=cls.count||1;
    for(let i=0;i<n;i++){
      let s=new Soldier(x+(Math.random()-.5)*36,y+(Math.random()-.5)*36,team,cls);
      this.members.push(s);soldiers.push(s);
    }
  }
  get dead(){return(this.cls.count||1)-this.members.length;}
  center(){
    if(!this.members.length)return this.poi;
    let sx=0,sy=0;for(let m of this.members){sx+=m.x;sy+=m.y;}
    return{x:sx/this.members.length,y:sy/this.members.length};
  }
  isArmoryBoosted(){
    if(!this.members.length)return false;
    let{tx,ty}=this.members[0].getTile();
    return buildings.some(b=>b.type==="armory"&&b.team===(this.team==="player"?1:-1)&&Math.hypot(b.x-tx,b.y-ty)<=3);
  }
  captureTerritory(){
    for(let s of this.members){
      let{tx,ty}=s.getTile();if(!inM(tx,ty))continue;
      let own=this.team==="player"?1:-1;
      if(mapOwn[ty][tx]!==own)mapOwn[ty][tx]=own;
      fog[ty][tx]=true;
      for(let b of buildings){if(b.x===tx&&b.y===ty)b.team=own;}
    }
  }
  update(){
    let c=this.center(),fighting=false;
    let armBoost=this.isArmoryBoosted();
    // [#3] Freeze movement while swirl is active (only for player squads as candidates)
    let frozenBySwirl=SWIRL.active&&this.team==="player";
    for(let s of this.members){
      s.update();if(s.hp<=0)continue;
      if(this.cls.id==="medic"){
        if(s.cool<=0){
          for(let sol of soldiers){
            if(sol.team===this.team&&sol.hp>0&&sol.hp<sol.cls.hp&&Math.hypot(sol.x-s.x,sol.y-s.y)<90)
              sol.hp=Math.min(sol.cls.hp,sol.hp+2.5);
          }
          s.cool=35;
        }
        continue;
      }
      if(this.cls.id==="engineer"){
        if(s.cool<=0){
          let{tx,ty}=s.getTile();
          for(let b of buildings){
            if(b.x===tx&&b.y===ty&&b.team===(this.team==="player"?1:-1)&&b.hp<b.maxHp)
              b.hp=Math.min(b.maxHp,b.hp+5);
          }
          s.cool=40;
        }
      }
      for(let e of soldiers){
        if(e.team===this.team||e.hp<=0)continue;
        let d=Math.hypot(e.x-s.x,e.y-s.y);
        if(d<s.range){
          fighting=true;
          if(s.cool<=0){
            let tdef=TDATA[e.terType].defBonus;
            let tatk=TDATA[s.terType].atkBonus;
            let shelt=e.inShelter?.45:0;
            let armMult=armBoost?1.25:1;
            if(Math.random()<(e.inShelter?.42:.72)){
              let dmg=Math.max(1,s.damage*tatk*armMult*(1-tdef-shelt));
              e.hp-=dmg;if(e.hp<=0){this.kills++;s.kills++;}
            }
            let col=this.team==="player"?"#5dd8ff":"#ff6060";
            let big=["tank","artillery","rocket"].includes(this.cls.id);
            bullets.push(new Bullet(s.x,s.y,e.x,e.y,col,big));
            s.cool=this.cls.id==="artillery"?65:this.cls.id==="sniper"?50:this.cls.id==="berserker"?14:20;
          }
        }
      }
    }
    this.members=this.members.filter(m=>m.hp>0);
    if(!this.members.length){squads=squads.filter(sq=>sq!==this);if(selected===this)selected=null;return;}
    this.captureTerritory();
    // Movement — frozen during swirl gesture
    if(!frozenBySwirl&&((!fighting&&this.cls.id!=="artillery")||this.cls.id==="cavalry")){
      let dx=this.poi.x-c.x,dy=this.poi.y-c.y,d=Math.hypot(dx,dy);
      if(d>16){
        dx/=d;dy/=d;
        for(let s of this.members){
          if(s.hp<=0)continue;
          let sp=s.speed*TDATA[s.terType].speedMult;
          s.x=clamp(s.x+dx*sp+(Math.random()-.5)*.35,OX()+TS()*.5,OX()+(MAP_W-.5)*TS());
          s.y=clamp(s.y+dy*sp+(Math.random()-.5)*.35,OT()+TS()*.5,OT()+(MAP_H-.5)*TS());
        }
      }
    }
    if(["mortar","rocket","artillery"].includes(this.cls.id)){
      this._bcool=Math.max(0,this._bcool-1);
      if(this._bcool<=0){
        for(let e of soldiers){
          if(e.team===this.team||e.hp<=0)continue;
          let d=Math.hypot(e.x-c.x,e.y-c.y);
          if(d<this.cls.range&&d>70){
            for(let near of soldiers){
              if(near.team===this.team||near.hp<=0)continue;
              if(Math.hypot(near.x-e.x,near.y-e.y)<55)near.hp-=this.cls.damage*(near.inShelter?.45:1);
            }
            explosions.push(new Explosion(e.x,e.y,true));
            bullets.push(new Bullet(c.x,c.y-25,e.x,e.y,"#ffb030",true));
            this._bcool=this.cls.id==="artillery"?70:50;break;
          }
        }
      }
    }
    for(let m of mines){
      if(m.triggered||m.team===this.team)continue;
      let{wx,wy}=tileToWorld(m.x,m.y);
      for(let s of this.members){
        if(Math.hypot(s.x-wx,s.y-wy)<TS()*1.1){
          m.triggered=true;
          for(let sol of soldiers){if(Math.hypot(sol.x-wx,sol.y-wy)<TS()*2)sol.hp-=25+Math.random()*20;}
          explosions.push(new Explosion(wx,wy,true));break;
        }
      }
    }
    if(this.team==="player"&&this.members.length){
      let{tx,ty}=this.members[0].getTile();
      for(let b of buildings){
        if(b.type==="watchtower"&&Math.hypot(b.x-tx,b.y-ty)<1.5){
          for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){let nx=b.x+dx,ny=b.y+dy;if(inM(nx,ny))fog[ny][nx]=true;}
        }
      }
    }
  }
  draw(){for(let s of this.members)s.draw();}
}

// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════
let squads=[],soldiers=[];
let gold=15,aiGold=18,timer=180,gameOver=false;
let goldAccum=0,aiGoldAccum=0,goldMineT=0;

function calcTerritory(){
  let p=0,a=0,tot=MAP_W*MAP_H;
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){if(mapOwn[y][x]===1)p++;if(mapOwn[y][x]===-1)a++;}
  return[Math.round(p/tot*100),Math.round(a/tot*100)];
}

// ═══════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════
let aiSpawnT=0,aiMoveT=0;
const AI_ELIGIBLE=TROOPS.filter(t=>!["spy","airstrike","mine","paratrooper","medic"].includes(t.id));
function pickCounterUnit(){
  let ps=squads.filter(s=>s.team==="player");
  let pref=[];
  if(ps.some(s=>s.cls.id==="tank"))pref.push("rocket","artillery","mortar");
  if(ps.some(s=>s.cls.id==="sniper"))pref.push("cavalry","berserker","shield");
  if(ps.some(s=>s.cls.id==="berserker"))pref.push("shield","squad","sniper");
  if(ps.length>=3)pref.push("mortar","artillery");
  for(let id of pref){let t=AI_ELIGIBLE.find(e=>e.id===id);if(t&&t.cost<=aiGold)return t;}
  let pool=AI_ELIGIBLE.filter(t=>t.cost<=aiGold);
  if(!pool.length)return [...AI_ELIGIBLE].sort((a,b)=>a.cost-b.cost)[0];
  let w=pool.map(t=>Math.max(1,10-t.cost)),tot=w.reduce((a,b)=>a+b,0),r=Math.random()*tot;
  for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0)return pool[i];}
  return pool[pool.length-1];
}
function aiMoveSquad(s){
  let c=s.center();
  let ps=squads.filter(sq=>sq.team==="player"&&sq.members.length);
  let nearest=null,nDist=Infinity;
  for(let p2 of ps){let d=Math.hypot(p2.center().x-c.x,p2.center().y-c.y);if(d<nDist){nDist=d;nearest=p2;}}
  let sbest=null,sBestD=Infinity;
  for(let b of buildings){if(b.team===1){let{wx,wy}=tileToWorld(b.x,b.y);let d=Math.hypot(wx-c.x,wy-c.y);if(d<sBestD){sBestD=d;sbest={x:wx,y:wy};}}}
  if(s.cls.id==="cavalry"){let side=Math.random()<.5?OX()+TS()*2:OX()+(MAP_W-2)*TS();s.poi={x:side,y:OT()+(MAP_H-3)*TS()};return;}
  if(nearest&&nDist<550){let nc=nearest.center();s.poi={x:nc.x+(Math.random()-.5)*35,y:nc.y+(Math.random()-.5)*35};}
  else if(sbest&&sBestD<450){s.poi=sbest;}
  else{s.poi={x:W()/2+(Math.random()-.5)*180,y:OT()+(MAP_H-4)*TS()};}
}
function updateAI(dt){
  aiGoldAccum+=dt;if(aiGoldAccum>=1){aiGoldAccum-=1;aiGold+=1.2;}
  aiSpawnT+=dt;
  if(aiSpawnT>1.6){
    aiSpawnT=0;
    let cls=pickCounterUnit();
    if(cls&&aiGold>=cls.cost){
      aiGold-=cls.cost;
      let x=OX()+(2+Math.random()*(MAP_W-4))*TS();
      let y=OT()+(.5+Math.random()*5)*TS();
      let sq=new Squad(x,y,"ai",{...cls});aiMoveSquad(sq);squads.push(sq);
    } else if(cls){aiSpawnT=1.0;}
  }
  aiMoveT+=dt;if(aiMoveT>.5){aiMoveT=0;for(let s of squads){if(s.team==="ai")aiMoveSquad(s);}}
}

// ═══════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════
function drawTerrain(){
  let ts=TS(),ox=OX(),ot=OT();
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      let px=ox+x*ts,py=ot+y*ts;
      if(!fog[y][x]){
        ctx.fillStyle="#0d0d14";ctx.fillRect(px,py,ts,ts);
        ctx.strokeStyle="rgba(0,0,0,.4)";ctx.lineWidth=.5;ctx.strokeRect(px,py,ts,ts);
        continue;
      }
      let td=TDATA[terrain[y][x]];
      ctx.fillStyle=td.color;ctx.fillRect(px,py,ts,ts);
      if(mapOwn[y][x]===1){ctx.fillStyle="rgba(79,195,247,.25)";ctx.fillRect(px,py,ts,ts);}
      else if(mapOwn[y][x]===-1){ctx.fillStyle="rgba(255,82,82,.25)";ctx.fillRect(px,py,ts,ts);}
      if(ts>=13&&td.icon){
        ctx.font=Math.min(ts-3,12)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(td.icon,px+ts/2,py+ts/2);ctx.textBaseline="alphabetic";
      }
      ctx.strokeStyle="rgba(0,0,0,.12)";ctx.lineWidth=.5;ctx.strokeRect(px,py,ts,ts);
    }
  }
}
function drawOutlines(){
  let ts=TS(),ox=OX(),ot=OT();
  function outline(own,col){
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();
    for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
      if(mapOwn[y][x]!==own||!fog[y][x])continue;
      let px=ox+x*ts,py=ot+y*ts;
      if(y===0||mapOwn[y-1][x]!==own){ctx.moveTo(px,py);ctx.lineTo(px+ts,py);}
      if(y===MAP_H-1||mapOwn[y+1][x]!==own){ctx.moveTo(px,py+ts);ctx.lineTo(px+ts,py+ts);}
      if(x===0||mapOwn[y][x-1]!==own){ctx.moveTo(px,py);ctx.lineTo(px,py+ts);}
      if(x===MAP_W-1||mapOwn[y][x+1]!==own){ctx.moveTo(px+ts,py);ctx.lineTo(px+ts,py+ts);}
    }
    ctx.stroke();
  }
  outline(1,"#4fc3f7");outline(-1,"#ff5252");
}
function drawBuildings(){
  let ts=TS(),ox=OX(),ot=OT();
  for(let b of buildings){
    if(!fog[b.y][b.x])continue;
    let px=ox+b.x*ts+ts/2,py=ot+b.y*ts+ts/2;
    let bt=BTYPES[b.type],sz=Math.min(ts-2,18);
    ctx.font=sz+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle="rgba(0,0,0,.45)";ctx.beginPath();ctx.arc(px,py,sz/2+3,0,Math.PI*2);ctx.fill();
    ctx.fillText(bt.emoji,px,py);ctx.textBaseline="alphabetic";
    if(b.team!==0){ctx.strokeStyle=b.team===1?"#4fc3f7":"#ff5252";ctx.lineWidth=2;ctx.beginPath();ctx.arc(px,py,sz/2+5,0,Math.PI*2);ctx.stroke();}
    let hp=b.hp/b.maxHp;
    ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(px-11,py-sz/2-9,22,3);
    ctx.fillStyle=hp>.5?"#4caf50":"#ff9800";ctx.fillRect(px-11,py-sz/2-9,22*hp,3);
  }
}
function drawMines(){
  let ts=TS(),ox=OX(),ot=OT();
  for(let m of mines){
    if(m.triggered||!fog[m.y][m.x])continue;
    let px=ox+m.x*ts+ts/2,py=ot+m.y*ts+ts/2;
    if(m.team==="player"){
      ctx.font=Math.min(ts-2,14)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("⚠️",px,py);ctx.textBaseline="alphabetic";
    }
  }
}

// [#1] Selection ring pulse (time-based)
let _pulseT=0;

// [#1] Draw pulsing selection ring + label + arrow for selected squad
// All other friendly squads get a faint 50% opacity indicator only
function drawSquadIndicators(){
  if(!selected||selected.team!=="player"||!selected.members.length)return;
  let now=performance.now();
  // Pulse: 0→1→0 over 800ms
  let pulse=(Math.sin((now/800)*Math.PI*2)+1)/2; // 0..1
  let ringAlpha=0.5+pulse*0.5; // 0.5..1.0
  let ringColor=`rgba(${Math.round(79+176*pulse)},${Math.round(195+60*pulse)},247,${ringAlpha})`;

  // Faint dots on non-selected friendly squads
  for(let sq of squads){
    if(sq.team!=="player"||sq===selected||!sq.members.length)continue;
    let c=sq.center();
    ctx.strokeStyle="rgba(79,195,247,0.3)";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(c.x,c.y,18,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }

  let sc=selected.center();

  // [#1] Big pulsing ring (60px radius)
  ctx.strokeStyle=ringColor;ctx.lineWidth=3;ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(sc.x,sc.y,60,0,Math.PI*2);ctx.stroke();
  // Inner glow ring
  ctx.strokeStyle=`rgba(255,255,255,${ringAlpha*0.4})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(sc.x,sc.y,54,0,Math.PI*2);ctx.stroke();

  // [#1] Floating label 40px above center
  let label=`${selected.cls.emoji} ${selected.cls.name} ❤️${selected.members.length}/${selected.cls.count||1}`;
  ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.textBaseline="alphabetic";
  let lx=sc.x,ly=sc.y-40;
  // Dark background pill
  let tw=ctx.measureText(label).width;
  ctx.fillStyle="rgba(0,0,0,0.72)";
  let ph=18,pw=tw+14;
  ctx.beginPath();
  ctx.roundRect?ctx.roundRect(lx-pw/2,ly-ph+2,pw,ph,8):ctx.rect(lx-pw/2,ly-ph+2,pw,ph);
  ctx.fill();
  ctx.fillStyle="#ffffff";ctx.fillText(label,lx,ly);
  ctx.textBaseline="alphabetic";

  // [#1] Arrow from center to POI
  if(selected.poi){
    let px=selected.poi.x,py=selected.poi.y;
    let adx=px-sc.x,ady=py-sc.y,alen=Math.hypot(adx,ady);
    if(alen>10){
      // Line from edge of ring to near POI
      let nx=adx/alen,ny=ady/alen;
      let sx2=sc.x+nx*64,sy2=sc.y+ny*64;
      let ex=px-nx*14,ey=py-ny*14;
      ctx.strokeStyle="rgba(255,255,255,0.85)";ctx.lineWidth=2;ctx.setLineDash([6,4]);
      ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(ex,ey);ctx.stroke();ctx.setLineDash([]);
      // Arrowhead
      let ah=10,aw=6;
      let ax1=ex-ah*nx+aw*ny,ay1=ey-ah*ny-aw*nx;
      let ax2=ex-ah*nx-aw*ny,ay2=ey-ah*ny+aw*nx;
      ctx.fillStyle="rgba(255,255,255,0.85)";
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(ax1,ay1);ctx.lineTo(ax2,ay2);ctx.closePath();ctx.fill();
      // POI pin
      ctx.font="16px Arial";ctx.textAlign="center";ctx.fillText("📍",px,py+6);
    }
  }
}

// [#3] Draw swirl selection zone overlay
function drawSwirlZone(){
  if(!SWIRL.zoneVisible)return;
  // Zone circle
  ctx.strokeStyle="rgba(79,195,247,0.35)";ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.arc(SWIRL.x,SWIRL.y,SWIRL_RADIUS,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(79,195,247,0.06)";
  ctx.beginPath();ctx.arc(SWIRL.x,SWIRL.y,SWIRL_RADIUS,0,Math.PI*2);ctx.fill();
  if(!SWIRL.candidates.length)return;
  // Highlight current candidate with bright pulsing ring
  let cand=SWIRL.candidates[SWIRL.cycleIdx];
  if(cand&&cand.members.length){
    let c=cand.center();
    let now=performance.now();
    let pulse=(Math.sin((now/600)*Math.PI*2)+1)/2;
    ctx.strokeStyle=`rgba(255,220,80,${0.6+pulse*0.4})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(c.x,c.y,60,0,Math.PI*2);ctx.stroke();
    // Label
    ctx.font="bold 12px Arial";ctx.textAlign="center";
    let lbl=`${cand.cls.emoji} ${cand.cls.name}`;
    let tw=ctx.measureText(lbl).width;
    ctx.fillStyle="rgba(0,0,0,.75)";
    ctx.fillRect(c.x-tw/2-7,c.y-54,tw+14,18);
    ctx.fillStyle="#ffe040";ctx.fillText(lbl,c.x,c.y-40);
  }
  // Counter label near finger
  if(SWIRL.candidates.length>1){
    let txt=`${SWIRL.cycleIdx+1}/${SWIRL.candidates.length}`;
    ctx.font="bold 11px Arial";ctx.textAlign="center";
    ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(SWIRL.x-18,SWIRL.y+SWIRL_RADIUS+4,36,16);
    ctx.fillStyle="#4fc3f7";ctx.fillText(txt,SWIRL.x,SWIRL.y+SWIRL_RADIUS+16);
  }
}

function drawPlacingCursor(){
  if(!placing||placing.id==="airstrike"||!lastPointer)return;
  let{tx,ty}=worldToTile(lastPointer.x,lastPointer.y);
  if(!inM(tx,ty))return;
  let ts=TS(),ox=OX(),ot=OT();
  let px=ox+tx*ts,py=ot+ty*ts;
  let valid=placing.id==="paratrooper"||(inM(tx,ty)&&mapOwn[ty][tx]!==-1);
  ctx.strokeStyle=valid?"rgba(79,195,247,.7)":"rgba(255,82,82,.7)";
  ctx.lineWidth=2;ctx.setLineDash([4,3]);
  ctx.strokeRect(px+1,py+1,ts-2,ts-2);ctx.setLineDash([]);
  ctx.fillStyle=valid?"rgba(79,195,247,.1)":"rgba(255,82,82,.1)";
  ctx.fillRect(px+1,py+1,ts-2,ts-2);
  ctx.font=Math.min(ts-4,18)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(placing.emoji,px+ts/2,py+ts/2);ctx.textBaseline="alphabetic";
  if(placing.id==="mine"){
    ctx.strokeStyle="rgba(255,200,0,.35)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.strokeRect(ox+(tx-4)*ts,ot+(ty-4)*ts,8*ts,8*ts);ctx.setLineDash([]);
  }
}
function drawDragLine(){
  if(!dragStart||!placing||placing.id!=="airstrike"||!lastPointer)return;
  ctx.strokeStyle="rgba(255,80,50,.7)";ctx.lineWidth=3;ctx.setLineDash([12,8]);
  ctx.beginPath();ctx.moveTo(dragStart.x,dragStart.y);ctx.lineTo(lastPointer.x,lastPointer.y);ctx.stroke();ctx.setLineDash([]);
  ctx.font="22px Arial";ctx.textAlign="center";ctx.fillText("✈️",lastPointer.x,lastPointer.y-10);
}

// Enemy fog zone
const FOG_ROWS=8;
function drawEnemyFogOverlay(){
  if(spyPlane)return;
  let ts=TS(),ox=OX(),ot=OT(),fogH=FOG_ROWS*ts;
  ctx.fillStyle="rgba(5,5,20,0.82)";ctx.fillRect(ox,ot,MAP_W*ts,fogH);
  ctx.strokeStyle="rgba(80,80,180,0.4)";ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(ox,ot+fogH);ctx.lineTo(ox+MAP_W*ts,ot+fogH);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(120,130,200,0.5)";ctx.font="11px Arial";ctx.textAlign="center";
  ctx.fillText("☁️  ENEMY TERRITORY — FOG OF WAR  ☁️",ox+MAP_W*ts/2,ot+fogH/2+4);
}

function draw(){
  ctx.clearRect(0,0,W(),H());
  ctx.fillStyle="#0c0c14";ctx.fillRect(0,0,W(),H());
  drawTerrain();drawOutlines();drawBuildings();drawMines();

  // Draw squads (enemy hidden in fog/zone)
  for(let sq of squads){
    if(sq.team==="ai"){
      let c=sq.center(),{tx,ty}=worldToTile(c.x,c.y);
      if(ty<FOG_ROWS&&!spyPlane)continue;
      if(ty>=FOG_ROWS&&inM(tx,ty)&&!fog[ty][tx])continue;
    }
    sq.draw();
  }

  bullets.forEach(b=>b.draw());
  explosions.forEach(e=>e.draw());
  if(spyPlane)spyPlane.draw();
  drawEnemyFogOverlay();

  // [#1] Selection indicators (behind fog overlay is fine)
  drawSquadIndicators();
  // [#3] Swirl zone
  drawSwirlZone();

  drawDragLine();
  drawPlacingCursor();
}

// ═══════════════════════════════════════════════════
// FIXED-STEP GAME LOOP
// ═══════════════════════════════════════════════════
let lastTime=performance.now(),accum=0;
const STEP=1/60;
function logicStep(dt){
  timer-=dt;if(timer<=0)timer=0;
  goldAccum+=dt;if(goldAccum>=1){goldAccum-=1;gold+=1;}
  goldMineT+=dt;
  if(goldMineT>=1){
    goldMineT=0;
    for(let b of buildings){
      if(b.type==="goldmine"&&b.team===1){
        let near=soldiers.some(s=>{if(s.team!=="player"||s.hp<=0)return false;let{tx,ty}=s.getTile();return Math.abs(tx-b.x)+Math.abs(ty-b.y)<=2;});
        if(near)gold+=2;
      }
      if(b.type==="barracks"&&b.team===1)gold+=.2;
    }
  }
  updateAI(dt);
  for(let sq of [...squads])sq.update();
  for(let b of bullets)b.update();bullets=bullets.filter(b=>b.life>0);
  for(let e of explosions)e.update();explosions=explosions.filter(e=>e.life>0);
  if(spyPlane)spyPlane.update();
  soldiers=soldiers.filter(s=>s.hp>0);
  let[tp,ta]=calcTerritory();
  document.getElementById("tDisp").textContent=Math.ceil(timer);
  document.getElementById("gDisp").textContent=Math.floor(gold);
  document.getElementById("pScore").textContent=tp+"%";
  document.getElementById("eScore").textContent=ta+"%";
  renderHand();
  if(timer<=0&&!gameOver){gameOver=true;showEnd();}
}
function gameLoop(now){
  let dt=Math.min((now-lastTime)/1000,.1);lastTime=now;
  if(!gameOver){accum+=dt;while(accum>=STEP){accum-=STEP;logicStep(STEP);}}
  draw();requestAnimationFrame(gameLoop);
}
function showEnd(){
  let[tp,ta]=calcTerritory();
  let wt=tp>ta?"🏆 YOU WIN!":tp<ta?"💀 AI WINS!":"🤝 DRAW";
  let el=document.getElementById("endTitle");
  el.textContent=wt;el.style.color=tp>ta?"#4fc3f7":tp<ta?"#ff5252":"#ffd54f";
  document.getElementById("endStats").innerHTML=
    `<div>🏴 You: ${tp}% &nbsp;|&nbsp; ☠️ Enemy: ${ta}%</div>`+
    `<div style="font-size:14px;color:#666;margin-top:8px">💰 Gold: ${Math.floor(gold)}</div>`;
  document.getElementById("end").style.display="flex";
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init(){
  initTerrain();initBuildings();
  mines=[];squads=[];soldiers=[];bullets=[];explosions=[];spyPlane=null;
  gold=15;aiGold=18;timer=180;gameOver=false;
  goldAccum=0;aiGoldAccum=0;goldMineT=0;aiSpawnT=0;aiMoveT=0;accum=0;
  placing=null;placingIdx=-1;selected=null;dragStart=null;lastPointer=null;
  SWIRL.active=false;SWIRL.zoneVisible=false;SWIRL.cancelled=false;
  buildDeck();resize();
}
init();
requestAnimationFrame(gameLoop);
</script>
