<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ Commander Clash</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;touch-action:none;}
html,body{margin:0;overflow:hidden;background:#0a0a0f;
  font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;-webkit-text-size-adjust:none;}
canvas{display:block;touch-action:none;}
#header{position:absolute;top:0;left:0;right:0;height:56px;
  background:linear-gradient(180deg,#070710 0%,rgba(7,7,16,.94)100%);
  color:#fff;display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;z-index:100;border-bottom:2px solid #1e2d4a;
  box-shadow:0 2px 20px rgba(0,0,0,.9);}
.hdr{display:flex;flex-direction:column;align-items:center;min-width:60px;}
.hlabel{font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:1.5px;}
.hval{font-size:20px;font-weight:900;line-height:1;}
#pScore{color:#4fc3f7;}#eScore{color:#ff5252;}#tDisp{color:#ffd54f;}#gDisp{color:#81c784;}
.hcenter{display:flex;gap:10px;align-items:center;}
/* Rally flag indicator */
#rallyIndicator{font-size:10px;color:#ffd54f;opacity:.7;text-align:center;line-height:1.2;}

#ui{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#060810 0%,rgba(6,8,14,.97)100%);
  padding:6px 6px 10px;z-index:100;border-top:2px solid #1e2d4a;}
#cardRow{display:flex;gap:5px;align-items:center;justify-content:center;margin-bottom:4px;}
.tc{width:64px;height:82px;border-radius:10px;border:2px solid #252535;
  background:linear-gradient(155deg,#151828,#0c0f1e);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;position:relative;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  flex-shrink:0;touch-action:manipulation;}
.tc:active{transform:scale(.92);}
.tc.active{border-color:#4fc3f7;box-shadow:0 0 16px #4fc3f780;
  background:linear-gradient(155deg,#0d2540,#091830);}
.tc.dragging{opacity:.5;transform:scale(.88);}
.tc .ce{font-size:22px;line-height:1.1;}
.tc .cn{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;opacity:.8;}
.tc .cc{font-size:11px;color:#ffd54f;font-weight:900;}
.tc .cd{font-size:6.5px;opacity:.45;text-align:center;padding:0 2px;}
/* Air unit card tint */
.tc.air-card{border-color:#a855f7;background:linear-gradient(155deg,#1a0d2e,#0e0819);}
.tc.air-card .cc{color:#c084fc;}

#dragGhost{position:fixed;pointer-events:none;z-index:300;
  width:64px;height:82px;border-radius:10px;border:2px solid #4fc3f7;
  background:linear-gradient(155deg,#0d2540,#091830);color:#fff;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:11px;opacity:.9;box-shadow:0 0 20px #4fc3f760;}
#offhand{width:52px;height:70px;border-radius:8px;border:2px dashed #2a3050;
  background:rgba(255,255,255,.03);color:#888;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;cursor:pointer;
  font-size:9px;text-align:center;flex-shrink:0;position:relative;
  transition:border-color .15s,background .15s,box-shadow .15s;}
#offhand.has{border-color:#7c4dff;background:rgba(124,77,255,.1);}
#offhand.dropready{border-color:#4fc3f7;background:rgba(79,195,247,.15);box-shadow:0 0 18px #4fc3f780;}
#offhand .oe{font-size:18px;}
#offhand .ol{font-size:7px;position:absolute;top:3px;opacity:.4;}
#uibot{display:flex;gap:5px;align-items:center;justify-content:center;flex-wrap:wrap;}
#deckinfo{font-size:10px;color:#666;}
#cycleBtn{padding:3px 8px;font-size:10px;font-weight:700;
  background:linear-gradient(145deg,#1a2540,#0f1830);
  color:#7ec8e3;border:1.5px solid #2a4060;border-radius:7px;cursor:pointer;
  touch-action:manipulation;flex-shrink:0;}
#cycleBtn:active{transform:scale(.93);}
/* Rally button */
#rallyBtn{padding:3px 8px;font-size:10px;font-weight:700;
  background:linear-gradient(145deg,#2a1a10,#1a1005);
  color:#ffd54f;border:1.5px solid #5a3a10;border-radius:7px;cursor:pointer;
  touch-action:manipulation;flex-shrink:0;}
#rallyBtn.active-rally{border-color:#ffd54f;box-shadow:0 0 10px #ffd54f60;color:#fff;}
#rallyBtn:active{transform:scale(.93);}

#banner{position:absolute;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.88);color:#fff;padding:6px 16px;border-radius:18px;
  font-size:11px;display:none;z-index:99;white-space:nowrap;
  border:1.5px solid #444;box-shadow:0 3px 12px rgba(0,0,0,.6);}
#hprev{position:absolute;pointer-events:none;z-index:98;display:none;
  flex-direction:column;align-items:center;background:rgba(0,0,0,.88);
  border:2px solid #4fc3f7;border-radius:10px;padding:7px 12px;color:#fff;font-size:11px;gap:2px;}
#hprev .hpe{font-size:26px;}
#end{display:none;position:absolute;inset:0;background:rgba(0,0,0,.97);color:#fff;
  justify-content:center;align-items:center;flex-direction:column;z-index:200;padding:20px;}
#end h1{font-size:38px;margin:8px 0;text-shadow:0 0 20px currentColor;}
#endStats{font-size:16px;margin:12px 0;text-align:center;line-height:2;}
#replayBtn{padding:14px 30px;font-size:17px;
  background:linear-gradient(145deg,#4CAF50,#2E7D32);
  color:#fff;border:none;border-radius:12px;margin-top:16px;font-weight:800;cursor:pointer;}
/* Morale flash */
@keyframes moraleFlash{0%{opacity:1}50%{opacity:.2}100%{opacity:1}}
</style>
</head>
<body>
<div id="header">
  <div class="hdr"><span class="hlabel">🏴 YOU</span><span class="hval" id="pScore">0%</span></div>
  <div class="hcenter">
    <div class="hdr"><span class="hlabel">⏱ TIME</span><span class="hval" id="tDisp">240</span></div>
    <div class="hdr"><span class="hlabel">💰 GOLD</span><span class="hval" id="gDisp">15</span></div>
    <div id="rallyIndicator">📍<br>No rally</div>
  </div>
  <div class="hdr"><span class="hlabel">☠️ ENEMY</span><span class="hval" id="eScore">0%</span></div>
</div>
<div id="banner"></div>
<div id="hprev"><div class="hpe" id="hpe"></div><div id="hpn" style="font-weight:800"></div><div id="hpi" style="font-size:9px;opacity:.65"></div></div>
<div id="dragGhost"></div>
<canvas id="game"></canvas>
<div id="ui">
  <div id="cardRow">
    <div id="offhand"><span class="ol">HOLD</span><div class="oe" id="oe">🤚</div><div id="on" style="font-size:7px;opacity:.6"></div></div>
    <div class="tc" id="c0"></div>
    <div class="tc" id="c1"></div>
    <div class="tc" id="c2"></div>
  </div>
  <div id="uibot">
    <span id="deckinfo">🃏 --</span>
    <button id="cycleBtn">⟳ NEW HAND</button>
    <button id="rallyBtn">📍 RALLY</button>
    <span style="font-size:8px;color:#444">Hold=preview</span>
  </div>
</div>
<div id="end">
  <h1 id="endTitle">⚔️</h1>
  <div id="endStats"></div>
  <button id="replayBtn" onclick="location.reload()">🔄 PLAY AGAIN</button>
</div>
<script>
// ═══════════════════════════════════════════════════
// CANVAS & LAYOUT
// ═══════════════════════════════════════════════════
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const HEADER_H=56;
const MAP_W=20,MAP_H=36;
let UI_H=108;
function W(){return canvas.width;}
function H(){return canvas.height;}
function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  UI_H=document.getElementById("ui").offsetHeight||108;
}
resize();window.addEventListener("resize",resize);
function TS(){return Math.floor((H()-HEADER_H-UI_H)/MAP_H);}
function OX(){return Math.floor((W()-MAP_W*TS())/2);}
function OT(){return HEADER_H;}

// ═══════════════════════════════════════════════════
// TERRAIN
// ═══════════════════════════════════════════════════
const T_PLAINS=0,T_MOUNTAIN=1,T_RIVER=2,T_FOREST=3,T_DESERT=4;
let terrain=[],mapOwn=[],fog=[];
let buildings=[],mines=[];
const TDATA={
  [T_PLAINS]:  {color:"#6a7d55",icon:"",  speedMult:1.0, defBonus:0.0, atkBonus:1.0},
  [T_MOUNTAIN]:{color:"#7a7060",icon:"⛰", speedMult:0.45,defBonus:0.55,atkBonus:1.4},
  [T_RIVER]:   {color:"#2e5f9a",icon:"🌊", speedMult:0.5, defBonus:-0.2,atkBonus:0.9},
  [T_FOREST]:  {color:"#2c5225",icon:"🌲", speedMult:0.75,defBonus:0.35,atkBonus:1.0},
  [T_DESERT]:  {color:"#b89a5a",icon:"",  speedMult:0.85,defBonus:0.0, atkBonus:1.0},
};
function initTerrain(){
  terrain=[];mapOwn=[];fog=[];
  for(let y=0;y<MAP_H;y++){
    let tr=[],mo=[],fg=[];
    for(let x=0;x<MAP_W;x++){tr.push(T_PLAINS);mo.push(0);fg.push(false);}
    terrain.push(tr);mapOwn.push(mo);fog.push(fg);
  }

  // ── RANDOM MAP GENERATION ─────────────────────────
  // Mountains: 4-7 random clusters, mirrored vertically so both sides are fair
  let numM=4+Math.floor(Math.random()*4);
  for(let i=0;i<numM;i++){
    let cx=2+Math.floor(Math.random()*(MAP_W-4));
    // Place in top half; mirror to bottom half
    let cy=9+Math.floor(Math.random()*(MAP_H/2-10));
    let r=1+Math.floor(Math.random()*2.5);
    // Top half cluster
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)
      if(Math.hypot(dx,dy)<=r){let nx=cx+dx,ny=cy+dy;if(inM(nx,ny))terrain[ny][nx]=T_MOUNTAIN;}
    // Mirror: bottom half cluster (symmetric y)
    let mcy=MAP_H-1-cy;
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)
      if(Math.hypot(dx,dy)<=r){let nx=cx+dx,ny=mcy+dy;if(inM(nx,ny))terrain[ny][nx]=T_MOUNTAIN;}
  }

  // Rivers: 1-3 rivers snaking from top to bottom at random x positions
  let numR=1+Math.floor(Math.random()*3);
  let usedRx=[];
  for(let i=0;i<numR;i++){
    // Pick an x that isn't too close to existing rivers or map edges
    let attempts=0,rx;
    do{rx=3+Math.floor(Math.random()*(MAP_W-6));attempts++;}
    while(usedRx.some(u=>Math.abs(u-rx)<4)&&attempts<20);
    usedRx.push(rx);
    let freq=0.5+Math.random()*0.7; // how wiggly
    let phase=Math.random()*Math.PI*2;
    for(let ry=1;ry<MAP_H-1;ry++){
      if(inM(rx,ry))terrain[ry][rx]=T_RIVER;
      // Occasionally widen river by 1 tile
      if(Math.random()<0.3){let nx=rx+(Math.random()<0.5?1:-1);if(inM(nx,ry))terrain[ry][nx]=T_RIVER;}
      rx+=Math.sin(ry*freq+phase)>0.45?1:Math.sin(ry*freq+phase)<-0.45?-1:0;
      rx=clamp(rx,2,MAP_W-3);
    }
  }

  // Forests: 4-8 random patches, scattered across mid-map
  let numF=4+Math.floor(Math.random()*5);
  for(let i=0;i<numF;i++){
    let fx=1+Math.floor(Math.random()*(MAP_W-2));
    let fy=6+Math.floor(Math.random()*(MAP_H-12));
    let fr=1+Math.floor(Math.random()*2);
    for(let dy=-fr;dy<=fr;dy++)for(let dx=-fr;dx<=fr;dx++)
      if(Math.hypot(dx,dy)<=fr){let nx=fx+dx,ny=fy+dy;if(inM(nx,ny)&&terrain[ny][nx]===T_PLAINS)terrain[ny][nx]=T_FOREST;}
  }

  // Desert: a random diagonal or horizontal band across the mid-map
  let dCenter=Math.floor(MAP_H/2)+Math.floor((Math.random()-.5)*4);
  let dAngle=(Math.random()-.5)*0.4; // slight diagonal
  for(let x=0;x<MAP_W;x++){
    let dy=Math.floor(x*dAngle);
    for(let offset=-1;offset<=1;offset++){
      let y=dCenter+dy+offset;
      if(inM(x,y)&&terrain[y][x]===T_PLAINS)terrain[y][x]=T_DESERT;
    }
  }

  // Starting territories: bottom 8 = player, top 8 = enemy
  for(let y=MAP_H-8;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){mapOwn[y][x]=1;fog[y][x]=true;}
  for(let y=0;y<8;y++)for(let x=0;x<MAP_W;x++){mapOwn[y][x]=-1;fog[y][x]=true;}
}
function inM(x,y){return x>=0&&x<MAP_W&&y>=0&&y<MAP_H;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function worldToTile(wx,wy){return{tx:Math.floor((wx-OX())/TS()),ty:Math.floor((wy-OT())/TS())};}
function tileToWorld(tx,ty){return{wx:OX()+tx*TS()+TS()/2,wy:OT()+ty*TS()+TS()/2};}

// ═══════════════════════════════════════════════════
// BUILDINGS
// ═══════════════════════════════════════════════════
const BTYPES={
  barracks:  {emoji:"🏯",hp:100,name:"Barracks", effect:"Shelter + gold +0.3/s"},
  watchtower:{emoji:"🗼",hp:60, name:"Watchtower",effect:"Reveals 6-tile fog"},
  fortress:  {emoji:"🏰",hp:180,name:"Fortress",  effect:"Heavy shelter -60% dmg"},
  armory:    {emoji:"⚙️", hp:70, name:"Armory",    effect:"+30% attack nearby"},
  goldmine:  {emoji:"⛏️", hp:50, name:"Gold Mine", effect:"+3 gold/s if manned"},
};
function initBuildings(){
  buildings=[];
  const bkeys=Object.keys(BTYPES);
  let tries=0;
  // Ensure buildings are spread across the map, not just clumped
  while(buildings.length<16&&tries<400){
    tries++;
    let bx=1+Math.floor(Math.random()*(MAP_W-2));
    // Bias placement toward mid-map (rows 8-28) for strategic contestation
    let by=8+Math.floor(Math.random()*(MAP_H-16));
    if(terrain[by][bx]===T_RIVER||terrain[by][bx]===T_MOUNTAIN)continue;
    // Enforce minimum distance between buildings
    if(buildings.some(b=>Math.hypot(b.x-bx,b.y-by)<3))continue;
    let t=bkeys[Math.floor(Math.random()*bkeys.length)];
    buildings.push({x:bx,y:by,type:t,hp:BTYPES[t].hp,maxHp:BTYPES[t].hp,team:0,destroyed:false});
  }
}

// ═══════════════════════════════════════════════════
// TROOP DEFINITIONS
// ═══════════════════════════════════════════════════
// airUnit: can only be targeted by antiAir units
// antiAir: can target air units
// groundOnly: cannot attack air
// captureRadius: tile radius around each member that gets captured (default 1)
// Range philosophy:
//   Melee (berserker, shield): 55px — must close distance, high risk
//   Short (cavalry, engineer, medic): 70-80px — skirmish range
//   Standard (soldier, squad, para, tank): 85-110px — rifle range
//   Medium (mortar, rocket, sniper): 170-220px — fire support
//   Long (artillery): 250px — siege
const TROOPS=[
  // cost:1 — cheap scout / territory grabber, dies easily
  {id:"soldier",  name:"Soldier",   emoji:"🪖",cost:1, count:2,hp:9, range:85, damage:3,  speed:.36,desc:"×2 scouts, capture fast",     groundOnly:true, captureRadius:2},
  // cost:3 — glass cannon, punished hard if enemies close in
  {id:"sniper",   name:"Sniper",    emoji:"🎯",cost:3, count:1,hp:7, range:220,damage:11, speed:.25,desc:"Long range, fragile",           groundOnly:true, captureRadius:1},
  // cost:3 — utility builder, very short combat range
  {id:"engineer", name:"Engineer",  emoji:"🔧",cost:3, count:1,hp:9, range:72, damage:2,  speed:.30,desc:"Repairs buildings",             groundOnly:true, captureRadius:2},
  // cost:4 — backbone squad, standard rifle range
  {id:"squad",    name:"Squad",     emoji:"👥",cost:4, count:4,hp:9, range:95, damage:3,  speed:.30,desc:"4-man balanced fire team",      groundOnly:true, captureRadius:1},
  // cost:4 — support, needs to be close to heal
  {id:"medic",    name:"Medic",     emoji:"💉",cost:4, count:1,hp:11,range:75, damage:0,  speed:.30,desc:"Heals nearby allies",           groundOnly:true, captureRadius:1},
  // cost:5 — fast flanker, short melee-ish range but huge speed
  {id:"cavalry",  name:"Cavalry",   emoji:"🏇",cost:5, count:2,hp:16,range:75, damage:8,  speed:.60,desc:"Fast flanking, wide captures",  groundOnly:true, captureRadius:3},
  // cost:5 — defensive wall, point-blank only, very high hp per cost
  {id:"shield",   name:"Shield",    emoji:"🛡️",cost:5, count:2,hp:32,range:55, damage:4,  speed:.16,desc:"Tanky wall, holds ground",      groundOnly:true, captureRadius:1},
  // cost:6 — berserk melee fury, ignores terrain def, must close in
  {id:"berserker",name:"Berserker", emoji:"🪓",cost:6, count:2,hp:22,range:58, damage:17, speed:.50,desc:"Melee fury, ignores defence",   groundOnly:true, captureRadius:1},
  // cost:6 — surprise deep-strike, standard range
  {id:"para",     name:"Para",      emoji:"🪂",cost:6, count:3,hp:11,range:95, damage:5,  speed:.33,desc:"Drop anywhere on map",          groundOnly:true, captureRadius:1},
  // cost:7 — anti-armour, medium range, can hit air
  {id:"rocket",   name:"Rocket",    emoji:"🚀",cost:7, count:1,hp:13,range:190,damage:20, speed:.19,desc:"Anti-tank, hits air",           antiAir:true,    captureRadius:1},
  // cost:8 — area denial, lobbed arc, medium range, can't hit air
  {id:"mortar",   name:"Mortar",    emoji:"💣",cost:8, count:1,hp:14,range:175,damage:16, speed:.11,desc:"Area blast, can't hit air",     groundOnly:true, captureRadius:1},
  // cost:8 — heavy armour, short cannon range (tank not sniper)
  {id:"tank",     name:"Tank",      emoji:"🚛",cost:8, count:1,hp:85,range:110,damage:15, speed:.18,desc:"Heavy armour, wide capture",    groundOnly:true, captureRadius:3},
  // cost:9 — max-range siege cannon, hits air
  {id:"artillery",name:"Artillery", emoji:"🔫",cost:9, count:1,hp:18,range:250,damage:22, speed:.08,desc:"Max range, hits air",           antiAir:true,    captureRadius:1},
  // cost:4 — AA specialist, medium-short range, fast fire
  {id:"aa",       name:"AA Gun",    emoji:"🔭",cost:4, count:1,hp:14,range:170,damage:14, speed:.13,desc:"Anti-air specialist",           antiAir:true,    captureRadius:1},
  // --- special cards ---
  {id:"spy",      name:"Scout Plane",emoji:"🛩️",cost:3, count:0,hp:0, range:0,  damage:0,  speed:0,  desc:"Reveals enemy fog",           airUnit:true},
  // Airstrike: expensive (cost 16), rare in deck, but devastatingly lethal in radius
  {id:"airstrike",name:"Airstrike", emoji:"✈️",cost:16,count:0,hp:0, range:0,  damage:0,  speed:0,  desc:"Costly — wipes a line clean",  airUnit:true},
  {id:"mine",     name:"Land Mine", emoji:"⚠️",cost:2, count:0,hp:0, range:0,  damage:0,  speed:0,  desc:"Place near your troops"},
];
const TMAP={};for(let t of TROOPS)TMAP[t.id]=t;

// ═══════════════════════════════════════════════════
// DECK / HAND
// ═══════════════════════════════════════════════════
let deck=[],hand=[],offhandCard=null,deckIdx=0;
function buildDeck(){
  // Exclude special cards from base pool; weight cheaper cards higher
  let pool=TROOPS.filter(t=>!["spy","airstrike","mine"].includes(t.id));
  deck=[];
  for(let t of pool){
    let n=t.cost<=3?4:t.cost<=5?3:t.cost<=7?2:1;
    for(let i=0;i<n;i++)deck.push({...t});
  }
  // Add specials: 2 spy, 1 airstrike (rare+expensive), 3 mine
  deck.push({...TMAP.spy},{...TMAP.spy},{...TMAP.airstrike},{...TMAP.mine},{...TMAP.mine},{...TMAP.mine});
  shuffleDeck();
  hand=[];offhandCard=null;deckIdx=0;
  for(let i=0;i<3;i++)drawCard();
  renderHand();
}
function shuffleDeck(){
  for(let i=deck.length-1;i>0;i--){let j=0|Math.random()*(i+1);[deck[i],deck[j]]=[deck[j],deck[i]];}
}
function drawCard(){
  if(hand.length>=3)return;
  if(deckIdx>=deck.length){shuffleDeck();deckIdx=0;}
  hand.push({...deck[deckIdx++]});
}
function consumeCard(i){
  if(i===-99){let c=offhandCard;offhandCard=null;renderHand();return c;}
  let c=hand[i];hand.splice(i,1);drawCard();renderHand();return c;
}
function storeOffhand(i){
  if(offhandCard)return false;
  offhandCard=hand[i];hand.splice(i,1);drawCard();renderHand();return true;
}
function cycleHand(){
  hand=[];
  if(deckIdx+3>deck.length){shuffleDeck();deckIdx=0;}
  for(let i=0;i<3;i++)drawCard();
  placing=null;placingIdx=-1;
  renderHand();updateBanner();
  flashBanner("🔄 New hand!",1000);
}
function renderHand(){
  for(let i=0;i<3;i++){
    let el=document.getElementById("c"+i);
    let card=hand[i];
    if(!card){el.innerHTML="";el.className="tc";el.style.opacity="0.15";el.style.pointerEvents="none";continue;}
    el.style.pointerEvents="";
    let isActive=placing&&placingIdx===i;
    let isAir=card.airUnit;
    el.className="tc"+(isActive?" active":"")+(isAir?" air-card":"");
    el.style.opacity=gold<card.cost?"0.35":"1";
    el.innerHTML=`<div class="ce">${card.emoji}</div><div class="cn">${card.name}</div><div class="cc">💰${card.cost}</div><div class="cd">${card.desc}</div>`;
  }
  let oh=document.getElementById("offhand");
  if(offhandCard){oh.classList.add("has");document.getElementById("oe").textContent=offhandCard.emoji;document.getElementById("on").textContent=offhandCard.name;}
  else{oh.classList.remove("has");document.getElementById("oe").textContent="🤚";document.getElementById("on").textContent="";}
  document.getElementById("deckinfo").textContent="🃏 "+(deck.length-deckIdx)+" left";
}

// ═══════════════════════════════════════════════════
// DRAG CARD TO OFFHAND
// ═══════════════════════════════════════════════════
let cardDrag={active:false,idx:-1,card:null,startX:0,startY:0};
const ghost=document.getElementById("dragGhost");
function startCardDrag(idx,cx,cy){
  if(!hand[idx])return;
  cardDrag={active:true,idx,card:hand[idx],startX:cx,startY:cy};
  ghost.innerHTML=`<div style="font-size:22px">${hand[idx].emoji}</div><div style="font-size:8px;font-weight:700">${hand[idx].name}</div><div style="font-size:11px;color:#ffd54f">💰${hand[idx].cost}</div>`;
  ghost.style.display="flex";ghost.style.left=(cx-32)+"px";ghost.style.top=(cy-41)+"px";
  document.getElementById("c"+idx).classList.add("dragging");
}
function moveCardDrag(cx,cy){
  if(!cardDrag.active)return;
  ghost.style.left=(cx-32)+"px";ghost.style.top=(cy-41)+"px";
  let r=document.getElementById("offhand").getBoundingClientRect();
  document.getElementById("offhand").classList.toggle("dropready",cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom&&!offhandCard);
}
function endCardDrag(cx,cy){
  if(!cardDrag.active)return;
  ghost.style.display="none";
  document.getElementById("c"+cardDrag.idx).classList.remove("dragging");
  document.getElementById("offhand").classList.remove("dropready");
  let r=document.getElementById("offhand").getBoundingClientRect();
  if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom&&!offhandCard){
    storeOffhand(cardDrag.idx);
    flashBanner("📦 Stored in offhand",1200);
  }
  cardDrag.active=false;
}

// ═══════════════════════════════════════════════════
// INPUT STATE
// ═══════════════════════════════════════════════════
let placing=null,placingIdx=-1;
let selected=null,dragStart=null,lastPointer=null;
// Rally point: all new player squads auto-march here after placement
let rallyPoint=null;
let rallyMode=false; // next tap on map sets rally
// Hold-swirl state
const SWIRL={active:false,x:0,y:0,candidates:[],cycleIdx:0,
  zoneVisible:false,lastAngle:0,totalRotation:0,degreesPerStep:45,cancelled:false};
const SWIRL_RADIUS=80,SWIRL_HOLD_MS=350;

// ═══════════════════════════════════════════════════
// CARD LISTENERS
// ═══════════════════════════════════════════════════
for(let i=0;i<3;i++){
  (()=>{
    let idx=i,el=document.getElementById("c"+i);
    let holdT=null,didHold=false,dragMoved=false;
    el.addEventListener("pointerdown",e=>{
      e.stopPropagation();didHold=false;dragMoved=false;
      let cx=e.clientX,cy=e.clientY;
      holdT=setTimeout(()=>{didHold=true;let c=hand[idx];if(c)showPreview(c);},400);
      startCardDrag(idx,cx,cy);
    });
    el.addEventListener("pointermove",e=>{
      e.stopPropagation();
      if(Math.hypot(e.clientX-cardDrag.startX,e.clientY-cardDrag.startY)>8){dragMoved=true;clearTimeout(holdT);}
      moveCardDrag(e.clientX,e.clientY);
    });
    el.addEventListener("pointerup",e=>{
      e.stopPropagation();clearTimeout(holdT);hidePreview();
      endCardDrag(e.clientX,e.clientY);
      if(didHold||dragMoved)return;
      let card=hand[idx];if(!card)return;
      if(placing&&placingIdx===idx){placing=null;placingIdx=-1;renderHand();updateBanner();return;}
      if(gold<card.cost){flashBanner("❌ Need 💰"+card.cost,1200);return;}
      placing=card;placingIdx=idx;selected=null;dragStart=null;
      renderHand();updateBanner();
    });
    el.addEventListener("pointerleave",e=>{clearTimeout(holdT);hidePreview();moveCardDrag(e.clientX,e.clientY);});
    el.addEventListener("contextmenu",e=>{
      e.preventDefault();e.stopPropagation();
      if(hand[idx]&&!offhandCard){storeOffhand(idx);flashBanner("📦 Stored "+hand[idx]?.name||"card"+" in offhand",1500);}
    });
  })();
}
document.getElementById("offhand").addEventListener("pointerdown",e=>e.stopPropagation());
document.getElementById("offhand").addEventListener("pointerup",e=>{
  e.stopPropagation();
  if(offhandCard){
    if(gold<offhandCard.cost){flashBanner("❌ Not enough gold!",1200);return;}
    placing=offhandCard;placingIdx=-99;offhandCard=null;renderHand();updateBanner();
  }
});
document.getElementById("cycleBtn").addEventListener("pointerdown",e=>e.stopPropagation());
document.getElementById("cycleBtn").addEventListener("pointerup",e=>{e.stopPropagation();cycleHand();});
// Rally button: tap activates mode, then tap on map sends all nearby squads there
document.getElementById("rallyBtn").addEventListener("pointerdown",e=>e.stopPropagation());
document.getElementById("rallyBtn").addEventListener("pointerup",e=>{
  e.stopPropagation();
  rallyMode=!rallyMode;
  document.getElementById("rallyBtn").classList.toggle("active-rally",rallyMode);
  if(rallyMode)flashBanner("📍 Tap map — rallies squads within 10 tiles",2000);
  else{
    rallyPoint=null;
    document.getElementById("rallyBtn").classList.remove("active-rally");
    document.getElementById("rallyIndicator").innerHTML="📍<br>No rally";
    flashBanner("Rally cleared",700);
  }
});

function getPos(e){
  let r=canvas.getBoundingClientRect();
  let src=e.touches?e.touches[0]:e.changedTouches?e.changedTouches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}

// ═══════════════════════════════════════════════════
// CANVAS POINTER EVENTS
// ═══════════════════════════════════════════════════
canvas.addEventListener("pointerdown",e=>{
  e.preventDefault();
  let p=getPos(e);lastPointer=p;
  // Rally mode: tap sends all friendly squads within 10 tiles to this point
  if(rallyMode){
    let{tx,ty}=worldToTile(p.x,p.y);
    if(inM(tx,ty)){
      rallyPoint={x:p.x,y:p.y};
      rallyMode=false;
      document.getElementById("rallyBtn").classList.remove("active-rally");
      // Send all player squads within 10-tile radius
      const RALLY_TILE_R=10*TS(); // 10 tiles in pixels
      let rallied=0;
      for(let sq of squads){
        if(sq.team!=="player"||!sq.members.length)continue;
        let sc=sq.center();
        if(Math.hypot(sc.x-p.x,sc.y-p.y)<=RALLY_TILE_R){
          sq.setOrder(p.x,p.y);
          rallied++;
        }
      }
      let{tx:rtx,ty:rty}=worldToTile(p.x,p.y);
      document.getElementById("rallyIndicator").innerHTML=`📍<br>${rtx},${rty}`;
      flashBanner(rallied>0?`📍 ${rallied} squad${rallied>1?"s":""} rallying!`:"📍 Rally set (spawn default)",1400);
      if(rallied>0)announce(`Rally. ${rallied} unit${rallied>1?"s":""} moving.`);
      else announce("Rally point. Marked.");
      return;
    }
  }
  if(placing&&placing.id==="airstrike"){dragStart=p;return;}
  if(!placing){
    SWIRL.active=false;SWIRL.cancelled=false;SWIRL.zoneVisible=false;
    SWIRL.x=p.x;SWIRL.y=p.y;SWIRL.candidates=[];SWIRL.cycleIdx=0;
    SWIRL.totalRotation=0;SWIRL.lastAngle=0;
    // Tap priority: if selected, outside 60px = set new POI immediately
    if(selected&&selected.team==="player"&&selected.members.length){
      let c=selected.center();
      if(Math.hypot(c.x-p.x,c.y-p.y)>60){selected.setOrder(p.x,p.y);updateBanner();return;}
    }
    SWIRL._timer=setTimeout(()=>{
      if(SWIRL.cancelled)return;
      let cands=squads.filter(s=>s.team==="player"&&s.members.length&&
        Math.hypot(s.center().x-SWIRL.x,s.center().y-SWIRL.y)<SWIRL_RADIUS);
      if(!cands.length)return;
      if(selected){let si=cands.indexOf(selected);if(si>=0){let tmp=cands[si];cands.splice(si,1);cands.unshift(tmp);}}
      SWIRL.active=true;SWIRL.zoneVisible=true;SWIRL.candidates=cands;SWIRL.cycleIdx=0;
    },SWIRL_HOLD_MS);
  }
});
canvas.addEventListener("pointermove",e=>{
  e.preventDefault();
  let p=getPos(e);lastPointer=p;
  if(SWIRL.active&&SWIRL.zoneVisible){
    let dx=p.x-SWIRL.x,dy=p.y-SWIRL.y;
    if(Math.hypot(dx,dy)>SWIRL_RADIUS+20){SWIRL.active=false;SWIRL.cancelled=true;SWIRL.zoneVisible=false;return;}
    let angle=Math.atan2(dy,dx)*(180/Math.PI);
    if(SWIRL.lastAngle!==0&&SWIRL.candidates.length>1){
      let delta=angle-SWIRL.lastAngle;
      if(delta>180)delta-=360;if(delta<-180)delta+=360;
      SWIRL.totalRotation+=delta;
      let steps=Math.floor(Math.abs(SWIRL.totalRotation)/SWIRL.degreesPerStep);
      if(steps>0){
        let dir=SWIRL.totalRotation>0?1:-1;
        SWIRL.cycleIdx=(SWIRL.cycleIdx+dir*steps+SWIRL.candidates.length)%SWIRL.candidates.length;
        SWIRL.totalRotation-=dir*steps*SWIRL.degreesPerStep;
      }
    }
    SWIRL.lastAngle=angle;return;
  }
  if(!SWIRL.active&&SWIRL._timer&&Math.hypot(p.x-SWIRL.x,p.y-SWIRL.y)>15){
    clearTimeout(SWIRL._timer);SWIRL.cancelled=true;
  }
  if(placing)showInlinePrev(p);
});
canvas.addEventListener("pointerup",e=>{
  e.preventDefault();
  let p=getPos(e);clearTimeout(SWIRL._timer);hideInlinePrev();
  if(SWIRL.active&&SWIRL.zoneVisible){
    SWIRL.zoneVisible=false;SWIRL.active=false;
    if(SWIRL.candidates.length){selected=SWIRL.candidates[SWIRL.cycleIdx];updateBanner();}
    return;
  }
  SWIRL.active=false;SWIRL.zoneVisible=false;
  // Airstrike drag
  if(dragStart&&placing&&placing.id==="airstrike"){
    if(Math.hypot(p.x-dragStart.x,p.y-dragStart.y)>30&&gold>=placing.cost){
      gold-=placing.cost;consumeCard(placingIdx);doAirstrike(dragStart,p);
      announce("Airstrike. Inbound.");
    }
    dragStart=null;placing=null;placingIdx=-1;renderHand();updateBanner();return;
  }
  if(placing){
    let{tx,ty}=worldToTile(p.x,p.y);
    if(!inM(tx,ty))return;
    if(gold<placing.cost){flashBanner("❌ Not enough gold!",1200);return;}
    if(placing.id==="mine"){
      let ok=soldiers.some(s=>{if(s.team!=="player"||s.hp<=0)return false;let{tx:stx,ty:sty}=worldToTile(s.x,s.y);return Math.hypot(stx-tx,sty-ty)<=4;});
      if(!ok){flashBanner("⚠️ Place near your troops!",1800);return;}
      // PLACEMENT RESTRICTION: mines only on own territory
      if(mapOwn[ty][tx]!==1){flashBanner("❌ Own territory only!",1200);return;}
      gold-=placing.cost;consumeCard(placingIdx);
      mines.push({x:tx,y:ty,team:"player",triggered:false});
      announce("Mine. Planted.");
      placing=null;placingIdx=-1;renderHand();updateBanner();return;
    }
    if(placing.id==="spy"){
      gold-=placing.cost;consumeCard(placingIdx);spyPlane=new SpyPlane();
      announce("Scout plane. Airborne.");
      placing=null;placingIdx=-1;renderHand();updateBanner();return;
    }
    // PLACEMENT RESTRICTION: only on own tiles (not enemy, not neutral except para)
    if(placing.id!=="para"&&mapOwn[ty][tx]!==1){
      flashBanner("❌ Own territory only!",1200);return;
    }
    gold-=placing.cost;
    let cls=consumeCard(placingIdx);
    let sq=new Squad(p.x,p.y,"player",cls);
    squads.push(sq);selected=sq;
    // Announce deploy — vary the line a bit for flavour
    const deployLines={
      soldier:"Soldiers. Deployed.",
      sniper:"Sniper. In position.",
      engineer:"Engineer. Forward.",
      squad:"Squad. Moving out.",
      medic:"Medic. On the field.",
      cavalry:"Cavalry. Flanking.",
      shield:"Shield wall. Holding.",
      berserker:"Berserkers. Unleashed.",
      para:"Paratroopers. Away.",
      rocket:"Rocket team. Deployed.",
      mortar:"Mortar. Set up.",
      tank:"Armor. Rolling.",
      artillery:"Artillery. In position.",
      aa:"AA gun. Online.",
    };
    announce(deployLines[cls.id]||`${cls.name}. Deployed.`);
    // Apply rally point if set — use setOrder so squad advances properly
    if(rallyPoint)sq.setOrder(rallyPoint.x,rallyPoint.y);
    placing=null;placingIdx=-1;renderHand();updateBanner();return;
  }
  if(!SWIRL.cancelled){
    if(!selected){
      for(let s of squads){
        if(s.team!=="player"||!s.members.length)continue;
        if(Math.hypot(s.center().x-p.x,s.center().y-p.y)<44){selected=s;updateBanner();return;}
      }
    } else {
      let sc=selected.center();
      if(Math.hypot(sc.x-p.x,sc.y-p.y)<=60){
        for(let s of squads){
          if(s.team!=="player"||s===selected||!s.members.length)continue;
          if(Math.hypot(s.center().x-p.x,s.center().y-p.y)<44){selected=s;updateBanner();return;}
        }
        selected.setOrder(p.x,p.y);updateBanner();
      }
    }
  }
  SWIRL.cancelled=false;
});

// PREVIEW / BANNER

function showPreview(card){

let banT=null;
function updateBanner(){

function flashBanner(msg,dur){

// ═══════════════════════════════════════════════════
// AIRSTRIKE
// ═══════════════════════════════════════════════════
function doAirstrike(start,end){
  let dx=end.x-start.x,dy=end.y-start.y;
  let steps=clamp(Math.floor(Math.hypot(dx,dy)/44)+2,2,14);
  // Cost 16, only 1 in deck — earns the right to be devastating.
  // Kill zone: 52px from strike line. Guaranteed lethal — fortress halves it but still lethal.
  const KILL_R=52;
  for(let s of soldiers){
    if(s.team==="player"||s.hp<=0)continue;
    if(ptLineDist(s.x,s.y,start.x,start.y,end.x,end.y)<KILL_R)
      s.hp=-(s.cls.hp*10); // overkill flag — instant death regardless of shelter
  }
  for(let b of buildings){
    if(b.destroyed||b.team!==(-1))continue;
    let{wx,wy}=tileToWorld(b.x,b.y);
    if(ptLineDist(wx,wy,start.x,start.y,end.x,end.y)<KILL_R){
      b.hp=0;b.destroyed=true;explosions.push(new Explosion(wx,wy,true));
    }
  }
  // Visual: explosions along the line
  for(let i=0;i<=steps;i++){
    let t=i/steps,px=start.x+dx*t,py=start.y+dy*t;
    for(let k=0;k<5;k++){
      let rx=px+(Math.random()-.5)*80,ry=py+(Math.random()-.5)*50;
      bullets.push(new Bullet(rx-200,ry-280,rx,ry,"#ff8030",true));
    }
    explosions.push(new Explosion(px,py,true));
  }
}
function ptLineDist(px,py,x1,y1,x2,y2){
  let A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;
  let t=Math.max(0,Math.min(1,(A*C+B*D)/(C*C+D*D||1)));
  return Math.hypot(px-x1-t*C,py-y1-t*D);
}

// ═══════════════════════════════════════════════════
// BULLETS & EXPLOSIONS
// ═══════════════════════════════════════════════════
let bullets=[],explosions=[];
class Bullet{
  constructor(x,y,tx,ty,col="#4fc3f7",big=false){
    this.x=x;this.y=y;this.tx=tx;this.ty=ty;this.life=14;this.col=col;this.big=big;
  }
  update(){this.x+=(this.tx-this.x)*.28;this.y+=(this.ty-this.y)*.28;this.life--;}
  draw(){ctx.strokeStyle=this.col;ctx.lineWidth=this.big?3.5:1.8;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.tx,this.ty);ctx.stroke();}
}
class Explosion{
  constructor(x,y,big=false){this.x=x;this.y=y;this.life=26;this.max=26;this.big=big;}
  update(){this.life--;}
  draw(){
    let p=this.life/this.max,r=(this.max-this.life)*(this.big?7:4);
    ctx.fillStyle=`rgba(255,${0|140*p},0,${p*.75})`;ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,120,${p*.5})`;ctx.beginPath();ctx.arc(this.x,this.y,r*.45,0,Math.PI*2);ctx.fill();
  }
}

// ═══════════════════════════════════════════════════
// SPY PLANE
// ═══════════════════════════════════════════════════
let spyPlane=null;
class SpyPlane{
  constructor(){this.x=W()/2;this.y=H()-100;this.phase=0;this.timer=400;this.state="up";}
  update(){
    this.timer--;if(this.timer<=0){spyPlane=null;return;}
    this.phase+=.02;
    if(this.state==="up"){this.y-=2;this.x+=Math.sin(this.phase);if(this.y<OT()+TS()*5)this.state="circle";}
    else{this.x=W()/2+Math.cos(this.phase)*150;this.y=OT()+TS()*4+Math.sin(this.phase*.7)*35;}
    let{tx,ty}=worldToTile(this.x,this.y);
    for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){let nx=tx+dx,ny=ty+dy;if(inM(nx,ny))fog[ny][nx]=true;}
  }
  draw(){
    ctx.font="28px Arial";ctx.textAlign="center";ctx.fillText("🛩️",this.x,this.y);
    ctx.fillStyle="rgba(255,255,255,.7)";ctx.font="10px Arial";
    ctx.fillText("⛽"+Math.ceil(this.timer/20)+"s",this.x,this.y-20);
  }
}

// ═══════════════════════════════════════════════════
// SOLDIER CLASS
// ═══════════════════════════════════════════════════
class Soldier{
  constructor(x,y,team,cls){
    this.x=x;this.y=y;this.team=team;this.cls=cls;
    this.hp=cls.hp;this.range=cls.range;this.damage=cls.damage;
    this.speed=cls.speed||1.0;this.cool=0;this.kills=0;
    this.inShelter=false;this.terType=T_PLAINS;
    this.morale=1.0; // 1.0 = full, drops briefly when allies die nearby
  }
  getTile(){return worldToTile(this.x,this.y);}
  update(){
    this.cool=Math.max(0,this.cool-1);
    // Morale slowly recovers
    this.morale=Math.min(1,this.morale+0.002);
    let{tx,ty}=this.getTile();
    this.terType=inM(tx,ty)?terrain[ty][tx]:T_PLAINS;
    this.inShelter=false;
    for(let b of buildings){
      if(!b.destroyed&&b.x===tx&&b.y===ty&&(b.type==="fortress"||b.type==="barracks"))
        {this.inShelter=true;break;}
    }
  }
  draw(){
    let big=["tank","artillery"].includes(this.cls.id);
    let sz=big?26:18;
    ctx.font=sz+"px Arial";ctx.textAlign="center";
    // Low morale = slight red tint overlay
    if(this.morale<0.8){ctx.globalAlpha=0.5+this.morale*.5;}
    ctx.fillStyle="rgba(0,0,0,.4)";ctx.fillText(this.cls.emoji,this.x+1,this.y+sz/3+1);
    ctx.fillText(this.cls.emoji,this.x,this.y+sz/3);
    ctx.globalAlpha=1;
    let bw=20,hp=this.hp/this.cls.hp;
    ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(this.x-bw/2-1,this.y-sz/2-8,bw+2,5);
    ctx.fillStyle=hp>.6?"#4caf50":hp>.3?"#ffc107":"#f44336";
    ctx.fillRect(this.x-bw/2,this.y-sz/2-7,bw*hp,3);
    ctx.fillStyle=this.team==="player"?"#4fc3f7":"#ff5252";
    ctx.beginPath();ctx.arc(this.x,this.y-sz/2-11,2.5,0,Math.PI*2);ctx.fill();
  }
}

// ═══════════════════════════════════════════════════
// SQUAD CLASS
// ═══════════════════════════════════════════════════
// Squad orders:
//   "advance" — march to poi (first command), then transitions to "patrol"
//   "patrol"  — wander ±patrol_range tiles from patrolBase
//   "hold"    — stay put (no manual orders yet, but AI can use)
class Squad{
  constructor(x,y,team,cls){
    this.team=team;this.cls=cls;this.poi={x,y};
    this.members=[];this.kills=0;this._bcool=0;
    // "idle"    — freshly placed, holds position until player gives first command
    // "advance" — marching to poi (player-set or rally)
    // "patrol"  — reached poi, now pushing toward enemy on own initiative
    this.orders="idle";
    this.firstOrderGiven=false; // set true when player taps a destination
    this.patrolBase=null;
    this.patrolTarget=null;
    this.patrolTimer=0;
    let n=cls.count||1;
    for(let i=0;i<n;i++){
      let s=new Soldier(x+(Math.random()-.5)*36,y+(Math.random()-.5)*36,team,cls);
      this.members.push(s);soldiers.push(s);
    }
  }
  get dead(){return(this.cls.count||1)-this.members.length;}
  center(){
    if(!this.members.length)return this.poi;
    let sx=0,sy=0;for(let m of this.members){sx+=m.x;sy+=m.y;}
    return{x:sx/this.members.length,y:sy/this.members.length};
  }
  setOrder(px,py){
    this.poi={x:px,y:py};
    this.orders="advance";
    this.firstOrderGiven=true;
    this.patrolBase=null;
    this.patrolTarget=null;
  }
  isArmoryBoosted(){
    if(!this.members.length)return false;
    let{tx,ty}=this.members[0].getTile();
    return buildings.some(b=>!b.destroyed&&b.type==="armory"&&b.team===(this.team==="player"?1:-1)&&Math.hypot(b.x-tx,b.y-ty)<=3);
  }
  // DYNAMIC TERRITORY: capture radius around each member based on cls.captureRadius
  captureTerritory(){
    let own=this.team==="player"?1:-1;
    let cr=(this.cls.captureRadius||1);
    for(let s of this.members){
      let{tx,ty}=s.getTile();if(!inM(tx,ty))continue;
      for(let dy=-cr;dy<=cr;dy++)for(let dx=-cr;dx<=cr;dx++){
        if(Math.hypot(dx,dy)>cr)continue;
        let nx=tx+dx,ny=ty+dy;if(!inM(nx,ny))continue;
        if(mapOwn[ny][nx]!==own)mapOwn[ny][nx]=own;
        fog[ny][nx]=true;
        for(let b of buildings){if(!b.destroyed&&b.x===nx&&b.y===ny)b.team=own;}
      }
    }
  }
  update(){
    let c=this.center(),fighting=false;
    let armBoost=this.isArmoryBoosted();
    let frozenBySwirl=SWIRL.active&&this.team==="player";
    for(let s of this.members){
      s.update();if(s.hp<=0)continue;
      // Medic: heal
      if(this.cls.id==="medic"){
        if(s.cool<=0){
          for(let sol of soldiers){
            if(sol.team===this.team&&sol.hp>0&&sol.hp<sol.cls.hp&&Math.hypot(sol.x-s.x,sol.y-s.y)<95)
              sol.hp=Math.min(sol.cls.hp,sol.hp+3);
          }
          s.cool=30;
        }
        continue;
      }
      // Engineer: repair non-destroyed buildings
      if(this.cls.id==="engineer"){
        if(s.cool<=0){
          let{tx,ty}=s.getTile();
          for(let b of buildings){
            if(!b.destroyed&&b.x===tx&&b.y===ty&&b.team===(this.team==="player"?1:-1)&&b.hp<b.maxHp)
              b.hp=Math.min(b.maxHp,b.hp+6);
          }
          s.cool=35;
        }
      }
      // Combat — respect air/ground targeting rules
      for(let e of soldiers){
        if(e.team===this.team||e.hp<=0)continue;
        // AIR TARGETING RULES:
        // groundOnly troops cannot attack airUnit troops
        // airUnit troops (spy etc.) cannot be attacked by groundOnly — only antiAir can
        // Note: spy/airstrike have hp:0 so they won't be in soldiers[], this is future-proof
        if(e.cls.airUnit&&this.cls.groundOnly)continue; // ground can't hit air
        if(e.cls.airUnit&&!this.cls.antiAir)continue;   // only antiAir can hit air
        let d=Math.hypot(e.x-s.x,e.y-s.y);
        if(d<s.range){
          fighting=true;
          if(s.cool<=0){
            let tdef=TDATA[e.terType].defBonus;
            let tatk=TDATA[s.terType].atkBonus;
            let shelt=e.inShelter?.45:0;
            let armMult=armBoost?1.30:1;
            // Berserker ignores terrain defence bonus
            let defMult=this.cls.id==="berserker"?0:(1-tdef-shelt);
            let moraleMult=s.morale;
            if(Math.random()<(e.inShelter?.42:.72)){
              let dmg=Math.max(1,s.damage*tatk*armMult*defMult*moraleMult);
              let wasAlive=e.hp>0;
              e.hp-=dmg;
              if(wasAlive&&e.hp<=0){
                this.kills++;s.kills++;
                // Morale drop for nearby allies of the killed soldier
                for(let ally of soldiers){
                  if(ally.team===e.team&&ally.hp>0&&Math.hypot(ally.x-e.x,ally.y-e.y)<80)
                    ally.morale=Math.max(0.5,ally.morale-0.25);
                }
              }
            }
            let col=this.team==="player"?"#5dd8ff":"#ff6060";
            let big=["tank","artillery","rocket","aa"].includes(this.cls.id);
            bullets.push(new Bullet(s.x,s.y,e.x,e.y,col,big));
            s.cool=this.cls.id==="artillery"?90:this.cls.id==="sniper"?70:
                   this.cls.id==="berserker"?20:this.cls.id==="aa"?26:30;
          }
        }
      }
    }
    // Remove dead
    let prevCount=this.members.length;
    this.members=this.members.filter(m=>m.hp>0);
    if(!this.members.length){squads=squads.filter(sq=>sq!==this);if(selected===this)selected=null;return;}
    this.captureTerritory();

    // ── MOVEMENT & ORDERS ──────────────────────────
    if(!frozenBySwirl){
      let dx=0,dy=0,d=0;

      if(this.orders==="idle"){
        // Hold position — no movement until player gives first command
        // AI squads are never idle (aiMoveSquad always sets an order)
        d=0;
      }

      if(this.orders==="advance"){
        dx=this.poi.x-c.x;dy=this.poi.y-c.y;d=Math.hypot(dx,dy);
        // Reached POI → only then start patrolling toward enemy
        if(d<22){
          this.orders="patrol";
          this.patrolBase={x:c.x,y:c.y};
          this.patrolTarget=null;this.patrolTimer=0;
        }
      }

      if(this.orders==="patrol"){
        this.patrolTimer-=1;
        if(!this.patrolTarget||this.patrolTimer<=0){
          // Push progressively toward enemy territory from current patrol base
          // Player squads drift upward (enemy is at top, lower y)
          // AI squads drift downward (player is at bottom, higher y)
          let fwdY=this.team==="player"
            ? this.patrolBase.y-(30+Math.random()*70)
            : this.patrolBase.y+(30+Math.random()*70);
          let fwdX=this.patrolBase.x+(Math.random()-.5)*140;
          fwdX=clamp(fwdX,OX()+TS(),OX()+(MAP_W-1)*TS());
          fwdY=clamp(fwdY,OT()+TS()*2,OT()+(MAP_H-2)*TS());
          this.patrolTarget={x:fwdX,y:fwdY};
          // Advance the base so each wander step goes further forward
          this.patrolBase={x:fwdX,y:fwdY};
          this.patrolTimer=180+Math.random()*240; // 3-7s between patrol steps at 60fps
        }
        dx=this.patrolTarget.x-c.x;dy=this.patrolTarget.y-c.y;d=Math.hypot(dx,dy);
        if(d<18){this.patrolTarget=null;this.patrolTimer=0;}
      }

      // Actually move (artillery holds when fighting; cavalry always charges)
      let canMove=(!fighting&&this.cls.id!=="artillery")||this.cls.id==="cavalry";
      if(canMove&&d>16){
        dx/=d;dy/=d;
        for(let s of this.members){
          if(s.hp<=0)continue;
          let sp=s.speed*TDATA[s.terType].speedMult;
          s.x=clamp(s.x+dx*sp+(Math.random()-.5)*.3,OX()+TS()*.4,OX()+(MAP_W-.4)*TS());
          s.y=clamp(s.y+dy*sp+(Math.random()-.5)*.3,OT()+TS()*.4,OT()+(MAP_H-.4)*TS());
        }
      }
    }

    // Mortar/rocket/artillery bombardment
    if(["mortar","rocket","artillery","aa"].includes(this.cls.id)){
      this._bcool=Math.max(0,this._bcool-1);
      if(this._bcool<=0){
        for(let e of soldiers){
          if(e.team===this.team||e.hp<=0)continue;
          // AA targets air units if present, else ground
          if(this.cls.id==="aa"&&!e.cls.airUnit)continue;
          let d=Math.hypot(e.x-c.x,e.y-c.y);
          if(d<this.cls.range&&d>60){
            // Splash damage for mortar (not rocket or aa)
            if(this.cls.id==="mortar"){
              for(let near of soldiers){
                if(near.team===this.team||near.hp<=0)continue;
                if(Math.hypot(near.x-e.x,near.y-e.y)<55)near.hp-=this.cls.damage*(near.inShelter?.45:1);
              }
            } else {
              e.hp-=this.cls.damage*(e.inShelter?.5:1);
            }
            explosions.push(new Explosion(e.x,e.y,this.cls.id==="mortar"));
            bullets.push(new Bullet(c.x,c.y-20,e.x,e.y,"#ffb030",true));
            this._bcool=this.cls.id==="artillery"?100:this.cls.id==="aa"?32:75;break;
          }
        }
      }
    }

    // Mine check
    for(let m of mines){
      if(m.triggered||m.team===this.team)continue;
      let{wx,wy}=tileToWorld(m.x,m.y);
      for(let s of this.members){
        if(Math.hypot(s.x-wx,s.y-wy)<TS()*1.1){
          m.triggered=true;
          for(let sol of soldiers){if(Math.hypot(sol.x-wx,sol.y-wy)<TS()*2.2)sol.hp-=28+Math.random()*18;}
          explosions.push(new Explosion(wx,wy,true));break;
        }
      }
    }
    // Watchtower fog reveal
    if(this.team==="player"&&this.members.length){
      let{tx,ty}=this.members[0].getTile();
      for(let b of buildings){
        if(!b.destroyed&&b.type==="watchtower"&&Math.hypot(b.x-tx,b.y-ty)<1.5){
          for(let dy=-6;dy<=6;dy++)for(let dx=-6;dx<=6;dx++){let nx=b.x+dx,ny=b.y+dy;if(inM(nx,ny))fog[ny][nx]=true;}
        }
      }
    }
    // Building damage from tank (rams into enemy buildings)
    if(this.cls.id==="tank"){
      let{tx,ty}=this.members[0]?.getTile()||{tx:-1,ty:-1};
      for(let b of buildings){
        if(b.destroyed||b.team===(this.team==="player"?1:-1))continue;
        if(b.x===tx&&b.y===ty){
          b.hp-=0.5;
          if(b.hp<=0){b.hp=0;b.destroyed=true;explosions.push(new Explosion(tileToWorld(b.x,b.y).wx,tileToWorld(b.x,b.y).wy,true));}
        }
      }
    }
  }
  draw(){for(let s of this.members)s.draw();}
}

// GAME STATE
// ═══════════════════════════════════════════════════
let squads=[],soldiers=[];
let gold=15,aiGold=18,timer=240,gameOver=false;
let goldAccum=0,aiGoldAccum=0,goldMineT=0;
function calcTerritory(){
  let p=0,a=0,tot=MAP_W*MAP_H;
  for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){if(mapOwn[y][x]===1)p++;if(mapOwn[y][x]===-1)a++;}
  return[Math.round(p/tot*100),Math.round(a/tot*100)];
}

// ═══════════════════════════════════════════════════
// AI — smarter and more varied
// ═══════════════════════════════════════════════════
let aiSpawnT=0,aiMoveT=0,aiStrategy="rush"; // rush, contain, flank, siege
let aiStratTimer=0;
const AI_ELIGIBLE=TROOPS.filter(t=>!["spy","airstrike","mine","para","medic"].includes(t.id));

function pickCounterUnit(){
  let ps=squads.filter(s=>s.team==="player");
  let pref=[];
  if(ps.some(s=>s.cls.id==="tank"))pref.push("rocket","artillery","mortar");
  if(ps.some(s=>s.cls.id==="sniper"))pref.push("cavalry","berserker");
  if(ps.some(s=>s.cls.id==="berserker"))pref.push("shield","squad");
  if(ps.some(s=>s.cls.id==="artillery"))pref.push("cavalry","rocket");
  if(ps.length>=4)pref.push("mortar","artillery");
  // Strategy modifiers
  if(aiStrategy==="flank")pref.unshift("cavalry","berserker");
  if(aiStrategy==="siege")pref.unshift("artillery","mortar","rocket");
  if(aiStrategy==="rush")pref.unshift("squad","soldier","berserker");
  for(let id of pref){let t=AI_ELIGIBLE.find(e=>e.id===id);if(t&&t.cost<=aiGold)return t;}
  let pool=AI_ELIGIBLE.filter(t=>t.cost<=aiGold);
  if(!pool.length)return [...AI_ELIGIBLE].sort((a,b)=>a.cost-b.cost)[0];
  let w=pool.map(t=>Math.max(1,12-t.cost));
  let tot=w.reduce((a,b)=>a+b,0),r=Math.random()*tot;
  for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0)return pool[i];}
  return pool[pool.length-1];
}

function aiMoveSquad(sq){
  let c=sq.center();
  let ps=squads.filter(s=>s.team==="player"&&s.members.length);
  let nearest=null,nDist=Infinity;
  for(let p2 of ps){let d=Math.hypot(p2.center().x-c.x,p2.center().y-c.y);if(d<nDist){nDist=d;nearest=p2;}}
  // Target player-owned buildings (strategic pressure)
  let sbest=null,sBestD=Infinity;
  for(let b of buildings){
    if(b.team===1&&!b.destroyed){let{wx,wy}=tileToWorld(b.x,b.y);let d=Math.hypot(wx-c.x,wy-c.y);if(d<sBestD){sBestD=d;sbest={x:wx,y:wy};}}
  }
  // Cavalry always flanks wide
  if(sq.cls.id==="cavalry"||aiStrategy==="flank"){
    let side=Math.random()<.5?OX()+TS()*1.5:OX()+(MAP_W-1.5)*TS();
    sq.orders="advance";sq.poi={x:side,y:OT()+(MAP_H-4)*TS()};return;
  }
  // Siege: target buildings
  if(aiStrategy==="siege"&&sbest&&sBestD<600){sq.orders="advance";sq.poi=sbest;return;}
  if(nearest&&nDist<600){
    let nc=nearest.center();
    sq.orders="advance";sq.poi={x:nc.x+(Math.random()-.5)*40,y:nc.y+(Math.random()-.5)*40};
  } else if(sbest&&sBestD<500){
    sq.orders="advance";sq.poi=sbest;
  } else {
    sq.orders="advance";sq.poi={x:W()/2+(Math.random()-.5)*220,y:OT()+(MAP_H-5)*TS()};
  }
}

function updateAI(dt){
  // Vary AI strategy every 30-50s for dynamic pressure
  aiStratTimer+=dt;
  if(aiStratTimer>35+Math.random()*20){
    aiStratTimer=0;
    let strats=["rush","contain","flank","siege"];
    aiStrategy=strats[Math.floor(Math.random()*strats.length)];
  }
  aiGoldAccum+=dt;if(aiGoldAccum>=1){aiGoldAccum-=1;aiGold+=0.75;}
  aiSpawnT+=dt;
  if(aiSpawnT>3.5){
    aiSpawnT=0;
    let cls=pickCounterUnit();
    if(cls&&aiGold>=cls.cost){
      aiGold-=cls.cost;
      // AI spawns across full width (spread pressure)
      let x=OX()+(1.5+Math.random()*(MAP_W-3))*TS();
      let y=OT()+(.5+Math.random()*4.5)*TS();
      let sq=new Squad(x,y,"ai",{...cls});aiMoveSquad(sq);squads.push(sq);
    } else if(cls){aiSpawnT=2.0;}
  }
  aiMoveT+=dt;
  if(aiMoveT>.6){aiMoveT=0;for(let s of squads){if(s.team==="ai")aiMoveSquad(s);}}
}

// RENDERING
// ═══════════════════════════════════════════════════
function drawTerrain(){
  let ts=TS(),ox=OX(),ot=OT();
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      let px=ox+x*ts,py=ot+y*ts;
      if(!fog[y][x]){
        ctx.fillStyle="#0d0d14";ctx.fillRect(px,py,ts,ts);
        ctx.strokeStyle="rgba(0,0,0,.4)";ctx.lineWidth=.5;ctx.strokeRect(px,py,ts,ts);
        continue;
      }
      let td=TDATA[terrain[y][x]];
      ctx.fillStyle=td.color;ctx.fillRect(px,py,ts,ts);
      if(mapOwn[y][x]===1){ctx.fillStyle="rgba(79,195,247,.22)";ctx.fillRect(px,py,ts,ts);}
      else if(mapOwn[y][x]===-1){ctx.fillStyle="rgba(255,82,82,.22)";ctx.fillRect(px,py,ts,ts);}
      if(ts>=13&&td.icon){
        ctx.font=Math.min(ts-3,12)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(td.icon,px+ts/2,py+ts/2);ctx.textBaseline="alphabetic";
      }
      ctx.strokeStyle="rgba(0,0,0,.12)";ctx.lineWidth=.5;ctx.strokeRect(px,py,ts,ts);
    }
  }
}
function drawOutlines(){
  let ts=TS(),ox=OX(),ot=OT();
  function outline(own,col){
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();
    for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
      if(mapOwn[y][x]!==own||!fog[y][x])continue;
      let px=ox+x*ts,py=ot+y*ts;
      if(y===0||mapOwn[y-1][x]!==own){ctx.moveTo(px,py);ctx.lineTo(px+ts,py);}
      if(y===MAP_H-1||mapOwn[y+1][x]!==own){ctx.moveTo(px,py+ts);ctx.lineTo(px+ts,py+ts);}
      if(x===0||mapOwn[y][x-1]!==own){ctx.moveTo(px,py);ctx.lineTo(px,py+ts);}
      if(x===MAP_W-1||mapOwn[y][x+1]!==own){ctx.moveTo(px+ts,py);ctx.lineTo(px+ts,py+ts);}
    }
    ctx.stroke();
  }
  outline(1,"#4fc3f7");outline(-1,"#ff5252");
}
function drawBuildings(){
  let ts=TS(),ox=OX(),ot=OT();
  for(let b of buildings){
    if(!fog[b.y][b.x])continue;
    let px=ox+b.x*ts+ts/2,py=ot+b.y*ts+ts/2;
    let bt=BTYPES[b.type],sz=Math.min(ts-2,18);
    if(b.destroyed){
      // Rubble icon
      ctx.font=(sz*0.8)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.globalAlpha=0.4;ctx.fillText("💥",px,py);ctx.globalAlpha=1;ctx.textBaseline="alphabetic";
      continue;
    }
    ctx.font=sz+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle="rgba(0,0,0,.45)";ctx.beginPath();ctx.arc(px,py,sz/2+3,0,Math.PI*2);ctx.fill();
    ctx.fillText(bt.emoji,px,py);ctx.textBaseline="alphabetic";
    if(b.team!==0){ctx.strokeStyle=b.team===1?"#4fc3f7":"#ff5252";ctx.lineWidth=2;ctx.beginPath();ctx.arc(px,py,sz/2+5,0,Math.PI*2);ctx.stroke();}
    let hp=b.hp/b.maxHp;
    ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(px-11,py-sz/2-9,22,3);
    ctx.fillStyle=hp>.5?"#4caf50":"#ff9800";ctx.fillRect(px-11,py-sz/2-9,22*hp,3);
  }
}
function drawMines(){
  let ts=TS(),ox=OX(),ot=OT();
  for(let m of mines){
    if(m.triggered||!fog[m.y][m.x])continue;
    let px=ox+m.x*ts+ts/2,py=ot+m.y*ts+ts/2;
    if(m.team==="player"){
      ctx.font=Math.min(ts-2,14)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("⚠️",px,py);ctx.textBaseline="alphabetic";
    }
  }
}
// Rally point marker
function drawRallyPoint(){
  if(!rallyPoint)return;
  ctx.font="18px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.globalAlpha=0.7;
  ctx.fillText("📍",rallyPoint.x,rallyPoint.y);
  ctx.globalAlpha=1;ctx.textBaseline="alphabetic";
  // Pulsing ring
  let p=(Math.sin(performance.now()/400)+1)/2;
  ctx.strokeStyle=`rgba(255,213,79,${0.3+p*0.4})`;ctx.lineWidth=2;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(rallyPoint.x,rallyPoint.y,22+p*6,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
}

// Selection visuals
function drawSquadIndicators(){
  if(!selected||selected.team!=="player"||!selected.members.length)return;
  let now=performance.now();
  let pulse=(Math.sin((now/800)*Math.PI*2)+1)/2;
  let ringAlpha=0.5+pulse*0.5;
  let rr=Math.round(79+176*pulse),rg=Math.round(195+60*pulse);
  // Faint rings on non-selected friendly squads
  for(let sq of squads){
    if(sq.team!=="player"||sq===selected||!sq.members.length)continue;
    let c=sq.center();
    ctx.strokeStyle="rgba(79,195,247,0.28)";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(c.x,c.y,16,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
  let sc=selected.center();
  // Big pulsing ring
  ctx.strokeStyle=`rgba(${rr},${rg},247,${ringAlpha})`;ctx.lineWidth=3;ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(sc.x,sc.y,60,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=`rgba(255,255,255,${ringAlpha*0.35})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(sc.x,sc.y,54,0,Math.PI*2);ctx.stroke();
  // Label
  let label=`${selected.cls.emoji} ${selected.cls.name} ❤️${selected.members.length}/${selected.cls.count||1}`;
  ctx.font="bold 12px Arial";ctx.textAlign="center";ctx.textBaseline="alphabetic";
  let tw=ctx.measureText(label).width,ph=18,pw=tw+14;
  ctx.fillStyle="rgba(0,0,0,0.72)";
  if(ctx.roundRect)ctx.roundRect(sc.x-pw/2,sc.y-58,pw,ph,7);else ctx.rect(sc.x-pw/2,sc.y-58,pw,ph);
  ctx.fill();
  ctx.fillStyle="#ffffff";ctx.fillText(label,sc.x,sc.y-44);
  // Arrow to POI
  if(selected.poi){
    let{x:px,y:py}=selected.poi;
    let adx=px-sc.x,ady=py-sc.y,alen=Math.hypot(adx,ady);
    if(alen>12){
      let nx=adx/alen,ny=ady/alen;
      let sx2=sc.x+nx*64,sy2=sc.y+ny*64;
      let ex2=px-nx*14,ey2=py-ny*14;
      ctx.strokeStyle="rgba(255,255,255,0.8)";ctx.lineWidth=2;ctx.setLineDash([6,4]);
      ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(ex2,ey2);ctx.stroke();ctx.setLineDash([]);
      let ah=10,aw=6;
      ctx.fillStyle="rgba(255,255,255,0.8)";ctx.beginPath();
      ctx.moveTo(px,py);ctx.lineTo(ex2-ah*nx+aw*ny,ey2-ah*ny-aw*nx);
      ctx.lineTo(ex2-ah*nx-aw*ny,ey2-ah*ny+aw*nx);ctx.closePath();ctx.fill();
      ctx.font="15px Arial";ctx.textAlign="center";ctx.fillText("📍",px,py+5);
    }
  }
}
function drawSwirlZone(){
  if(!SWIRL.zoneVisible)return;
  ctx.strokeStyle="rgba(79,195,247,0.32)";ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.arc(SWIRL.x,SWIRL.y,SWIRL_RADIUS,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(79,195,247,0.05)";ctx.beginPath();ctx.arc(SWIRL.x,SWIRL.y,SWIRL_RADIUS,0,Math.PI*2);ctx.fill();
  if(!SWIRL.candidates.length)return;
  let cand=SWIRL.candidates[SWIRL.cycleIdx];
  if(cand&&cand.members.length){
    let cc=cand.center(),now=performance.now();
    let pulse=(Math.sin((now/600)*Math.PI*2)+1)/2;
    ctx.strokeStyle=`rgba(255,220,80,${0.6+pulse*0.4})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cc.x,cc.y,60,0,Math.PI*2);ctx.stroke();
    ctx.font="bold 12px Arial";ctx.textAlign="center";
    let lbl=`${cand.cls.emoji} ${cand.cls.name}`;
    let tw=ctx.measureText(lbl).width;
    ctx.fillStyle="rgba(0,0,0,.75)";ctx.fillRect(cc.x-tw/2-7,cc.y-54,tw+14,18);
    ctx.fillStyle="#ffe040";ctx.fillText(lbl,cc.x,cc.y-40);
  }
  if(SWIRL.candidates.length>1){
    let txt=`${SWIRL.cycleIdx+1}/${SWIRL.candidates.length}`;
    ctx.font="bold 11px Arial";ctx.textAlign="center";
    ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(SWIRL.x-18,SWIRL.y+SWIRL_RADIUS+4,36,16);
    ctx.fillStyle="#4fc3f7";ctx.fillText(txt,SWIRL.x,SWIRL.y+SWIRL_RADIUS+16);
  }
}
function drawPlacingCursor(){
  if(!placing||placing.id==="airstrike"||!lastPointer)return;
  let{tx,ty}=worldToTile(lastPointer.x,lastPointer.y);
  if(!inM(tx,ty))return;
  let ts=TS(),ox=OX(),ot=OT();
  let px2=ox+tx*ts,py2=ot+ty*ts;
  // Valid = own tile (or any for para)
  let valid=placing.id==="para"||(inM(tx,ty)&&mapOwn[ty][tx]===1);
  ctx.strokeStyle=valid?"rgba(79,195,247,.7)":"rgba(255,82,82,.7)";
  ctx.lineWidth=2;ctx.setLineDash([4,3]);
  ctx.strokeRect(px2+1,py2+1,ts-2,ts-2);ctx.setLineDash([]);
  ctx.fillStyle=valid?"rgba(79,195,247,.1)":"rgba(255,82,82,.1)";
  ctx.fillRect(px2+1,py2+1,ts-2,ts-2);
  ctx.font=Math.min(ts-4,18)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(placing.emoji,px2+ts/2,py2+ts/2);ctx.textBaseline="alphabetic";
  if(placing.id==="mine"){
    ctx.strokeStyle="rgba(255,200,0,.3)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.strokeRect(ox+(tx-4)*ts,ot+(ty-4)*ts,8*ts,8*ts);ctx.setLineDash([]);
  }
}
function drawDragLine(){
  if(!dragStart||!placing||placing.id!=="airstrike"||!lastPointer)return;
  ctx.strokeStyle="rgba(255,80,50,.7)";ctx.lineWidth=3;ctx.setLineDash([12,8]);
  ctx.beginPath();ctx.moveTo(dragStart.x,dragStart.y);ctx.lineTo(lastPointer.x,lastPointer.y);ctx.stroke();ctx.setLineDash([]);
  ctx.font="22px Arial";ctx.textAlign="center";ctx.fillText("✈️",lastPointer.x,lastPointer.y-10);
}
const FOG_ROWS=8;
function drawEnemyFogOverlay(){
  if(spyPlane)return;
  let ts=TS(),ox=OX(),ot=OT(),fogH=FOG_ROWS*ts;
  ctx.fillStyle="rgba(5,5,20,0.82)";ctx.fillRect(ox,ot,MAP_W*ts,fogH);
  ctx.strokeStyle="rgba(80,80,180,0.38)";ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(ox,ot+fogH);ctx.lineTo(ox+MAP_W*ts,ot+fogH);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(120,130,200,0.45)";ctx.font="10px Arial";ctx.textAlign="center";
  ctx.fillText("☁️  ENEMY TERRITORY — FOG OF WAR  ☁️",ox+MAP_W*ts/2,ot+fogH/2+4);
}
// AI strategy HUD (top right corner)
function drawAIStrategyHint(){
  let labels={rush:"⚡ Rush",contain:"🛡 Contain",flank:"🏇 Flank",siege:"🔫 Siege"};
  ctx.fillStyle="rgba(255,82,82,0.55)";ctx.font="9px Arial";ctx.textAlign="right";
  ctx.fillText("Enemy: "+labels[aiStrategy],W()-6,HEADER_H+14);
}

function draw(){
  ctx.clearRect(0,0,W(),H());
  ctx.fillStyle="#0c0c14";ctx.fillRect(0,0,W(),H());
  drawTerrain();drawOutlines();drawBuildings();drawMines();drawRallyPoint();
  for(let sq of squads){
    if(sq.team==="ai"){
      let c=sq.center(),{tx,ty}=worldToTile(c.x,c.y);
      if(ty<FOG_ROWS&&!spyPlane)continue;
      if(ty>=FOG_ROWS&&inM(tx,ty)&&!fog[ty][tx])continue;
    }
    sq.draw();
  }
  bullets.forEach(b=>b.draw());
  explosions.forEach(e=>e.draw());
  if(spyPlane)spyPlane.draw();
  drawEnemyFogOverlay();
  drawSquadIndicators();
  drawSwirlZone();
  drawDragLine();
  drawPlacingCursor();
  drawAIStrategyHint();
}

// ═══════════════════════════════════════════════════
// ANNOUNCER — queued TTS, never interrupts itself
// ═══════════════════════════════════════════════════
const ANN={
  queue:[],          // pending lines
  speaking:false,    // currently playing
  // Cooldown map: key → timestamp of last announce, prevents spam
  _cd:{},
  // How long (ms) before the same key can fire again
  _cdTime:{
    enemy_spotted:12000, // per unit type
    under_attack:8000,
    building_lost:10000,
    building_captured:8000,
    squad_eliminated:5000,
    low_gold:20000,
    time_warning:0,   // each fires once (tracked separately)
  },
};

// Preferred voice — deep authoritative male, Black Ops 2 style
let _voice=null;
function _pickVoice(){
  if(!window.speechSynthesis)return;
  let voices=speechSynthesis.getVoices();
  // Priority: deep English male voices
  let preferred=[
    "Google UK English Male",
    "Daniel",               // macOS/iOS deep UK male
    "Arthur",               // macOS deep UK male
    "Aaron",                // macOS US male
    "Fred",                 // macOS robotic/deep
    "Google US English",
    "Alex",
  ];
  for(let name of preferred){
    let v=voices.find(v=>v.name===name||v.name.includes(name));
    if(v){_voice=v;return;}
  }
  // Fallback: any English male-sounding voice
  _voice=voices.find(v=>v.lang.startsWith("en-GB"))||
         voices.find(v=>v.lang.startsWith("en"))||
         voices[0]||null;
}
if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged=_pickVoice;
  _pickVoice();
}

function _speakNext(){
  if(!window.speechSynthesis||ANN.speaking||!ANN.queue.length)return;
  let text=ANN.queue.shift();
  ANN.speaking=true;
  let utt=new SpeechSynthesisUtterance(text);
  utt.rate=0.82;    // deliberate, authoritative — not rushed
  utt.pitch=0.72;   // low and gravelly
  utt.volume=1.0;
  if(_voice)utt.voice=_voice;
  utt.onend=()=>{ANN.speaking=false;_speakNext();};
  utt.onerror=()=>{ANN.speaking=false;_speakNext();};
  speechSynthesis.speak(utt);
}

// Public: queue a line with optional cooldown key
function announce(text,cdKey){
  if(gameOver)return;
  if(cdKey){
    let now=Date.now();
    let wait=ANN._cdTime[cdKey]??5000;
    if(ANN._cd[cdKey]&&now-ANN._cd[cdKey]<wait)return;
    ANN._cd[cdKey]=now;
  }
  // Cap queue at 5 so old events don't pile up forever
  if(ANN.queue.length>=5)ANN.queue.splice(2); // keep first 2, drop middle
  ANN.queue.push(text);
  _speakNext();
}

// One-shot time warnings — each fires exactly once
let _timeWarnsFired={120:false,60:false,30:false,10:false};
function checkTimeWarnings(){
  if(timer<=10&&!_timeWarnsFired[10]){_timeWarnsFired[10]=true;announce("Ten seconds.");}
  else if(timer<=30&&!_timeWarnsFired[30]){_timeWarnsFired[30]=true;announce("Thirty seconds. Push.");}
  else if(timer<=60&&!_timeWarnsFired[60]){_timeWarnsFired[60]=true;announce("One minute remaining.");}
  else if(timer<=120&&!_timeWarnsFired[120]){_timeWarnsFired[120]=true;announce("Two minutes on the clock.");}
}

// Track which enemy unit types we've already spotted this game
let _spottedTypes=new Set();
// Track player building ownership to detect captures/losses
let _prevBuildingTeams=new Map(); // id→team
// Track which player squads existed to detect eliminations
let _prevPlayerSquadIds=new Set();
// Track under-attack state
let _playerHpMap=new Map(); // soldier id→hp
let _underAttackCooldown=0;

function resetAnnouncerState(){
  ANN.queue=[];ANN.speaking=false;ANN._cd={};
  _timeWarnsFired={120:false,60:false,30:false,10:false};
  _spottedTypes.clear();
  _prevBuildingTeams.clear();
  _prevPlayerSquadIds.clear();
  _playerHpMap.clear();
  _underAttackCooldown=0;
  if(window.speechSynthesis)speechSynthesis.cancel();
}

// Called every logic frame to detect events
function updateAnnouncer(dt){
  _underAttackCooldown=Math.max(0,_underAttackCooldown-dt);
  checkTimeWarnings();

  // ── ENEMY SPOTTED ─────────────────────────────
  // Check AI squads that have moved into revealed fog tiles
  for(let sq of squads){
    if(sq.team!=="ai"||!sq.members.length)continue;
    let id=sq.cls.id;
    if(_spottedTypes.has(id))continue;
    let c=sq.center();
    let{tx,ty}=worldToTile(c.x,c.y);
    // Visible if fog revealed and not in enemy home zone (or spy active)
    if(inM(tx,ty)&&fog[ty][tx]&&(ty>=FOG_ROWS||spyPlane)){
      _spottedTypes.add(id);
      // Flavour lines per unit type
      const spotLines={
        soldier: "Enemy soldiers. Advancing.",
        squad:   "Hostile squad. Contact.",
        sniper:  "Sniper. Take cover.",
        tank:    "Armor on the field. All units fall back.",
        mortar:  "Mortar team. Incoming.",
        cavalry: "Enemy cavalry. Watch your flanks.",
        shield:  "Shield wall. Holding position.",
        berserker:"Berserkers. Close range. Danger.",
        para:    "Paratroopers. Behind the line.",
        rocket:  "Rocket team. Armor at risk.",
        artillery:"Artillery. Seek cover now.",
        aa:      "Anti-air. Watch the skies.",
        engineer:"Enemy engineer. Neutralize.",
        medic:   "Hostile medic. Eliminating support.",
      };
      announce(spotLines[id]||`Hostile ${sq.cls.name} spotted.`,"enemy_spotted_"+id);
    }
  }

  // ── UNDER ATTACK ──────────────────────────────
  if(_underAttackCooldown<=0){
    for(let s of soldiers){
      if(s.team!=="player"||s.hp<=0)continue;
      let prev=_playerHpMap.get(s)||s.cls.hp;
      if(s.hp<prev-2){
        announce("Commander, we're taking fire!","under_attack");
        _underAttackCooldown=8;
        break;
      }
    }
  }
  // Update hp snapshot
  _playerHpMap.clear();
  for(let s of soldiers){if(s.team==="player")_playerHpMap.set(s,s.hp);}

  // ── SQUAD ELIMINATED ─────────────────────────
  let curIds=new Set(squads.filter(s=>s.team==="player").map(s=>s));
  for(let sq of _prevPlayerSquadIds){
    if(!curIds.has(sq)){
      announce(`${sq.cls.name} down. Squad eliminated.`,"squad_eliminated");
    }
  }
  _prevPlayerSquadIds=new Set(squads.filter(s=>s.team==="player"));

  // ── BUILDING CAPTURED / LOST ──────────────────
  for(let b of buildings){
    if(b.destroyed)continue;
    let prev=_prevBuildingTeams.get(b);
    if(prev!==undefined&&prev!==b.team){
      if(b.team===1) announce(`${BTYPES[b.type].name}. Secured.`,"building_captured");
      else if(b.team===-1&&prev===1) announce(`${BTYPES[b.type].name} lost. Enemy control.`,"building_lost");
    }
    _prevBuildingTeams.set(b,b.team);
  }
  // First pass: seed the map silently
  if(_prevBuildingTeams.size===0){
    for(let b of buildings)_prevBuildingTeams.set(b,b.team);
  }

  // ── LOW GOLD ──────────────────────────────────
  if(gold<4&&gold>0){
    announce("Gold critical. Spend wisely.","low_gold");
  }
}

// ═══════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════
let lastTime=performance.now(),accum=0;
const STEP=1/60;
function logicStep(dt){
  timer-=dt;if(timer<=0)timer=0;
  // Player income
  goldAccum+=dt;if(goldAccum>=1){goldAccum-=1;gold+=0.7;}
  goldMineT+=dt;
  if(goldMineT>=1){
    goldMineT=0;
    for(let b of buildings){
      if(b.destroyed)continue;
      if(b.type==="goldmine"&&b.team===1){
        let near=soldiers.some(s=>{if(s.team!=="player"||s.hp<=0)return false;let{tx,ty}=s.getTile();return Math.abs(tx-b.x)+Math.abs(ty-b.y)<=2;});
        if(near)gold+=3;
      }
      if(b.type==="barracks"&&b.team===1)gold+=.3;
    }
  }
  updateAI(dt);
  for(let sq of [...squads])sq.update();
  for(let b of bullets)b.update();bullets=bullets.filter(b=>b.life>0);
  for(let e of explosions)e.update();explosions=explosions.filter(e=>e.life>0);
  if(spyPlane)spyPlane.update();
  soldiers=soldiers.filter(s=>s.hp>0);
  updateAnnouncer(dt);
  let[tp,ta]=calcTerritory();
  document.getElementById("tDisp").textContent=Math.ceil(timer);
  document.getElementById("gDisp").textContent=Math.floor(gold);
  document.getElementById("pScore").textContent=tp+"%";
  document.getElementById("eScore").textContent=ta+"%";
  renderHand();
  if(timer<=0&&!gameOver){gameOver=true;showEnd();}
}
function gameLoop(now){
  let dt=Math.min((now-lastTime)/1000,.1);lastTime=now;
  if(!gameOver){accum+=dt;while(accum>=STEP){accum-=STEP;logicStep(STEP);}}
  draw();requestAnimationFrame(gameLoop);
}
function showEnd(){
  let[tp,ta]=calcTerritory();
  let wt=tp>ta?"🏆 YOU WIN!":tp<ta?"💀 AI WINS!":"🤝 DRAW";
  let kills=squads.reduce((s,sq)=>s+(sq.team==="player"?sq.kills:0),0);
  let el=document.getElementById("endTitle");
  el.textContent=wt;el.style.color=tp>ta?"#4fc3f7":tp<ta?"#ff5252":"#ffd54f";
  document.getElementById("endStats").innerHTML=
    `<div>🏴 You: ${tp}% &nbsp;|&nbsp; ☠️ Enemy: ${ta}%</div>`+
    `<div>⚔️ Your kills: ${kills}</div>`+
    `<div style="font-size:13px;color:#666">💰 Gold remaining: ${Math.floor(gold)}</div>`;
  document.getElementById("end").style.display="flex";
  // Announce result — clear queue first so it fires immediately
  ANN.queue=[];ANN.speaking=false;
  if(window.speechSynthesis)speechSynthesis.cancel();
  if(tp>ta)announce("Objective secured. Mission complete.");
  else if(tp<ta)announce("Lines broken. Mission failed.");
  else announce("Stalemate. Withdraw.");
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init(){
  initTerrain();initBuildings();
  mines=[];squads=[];soldiers=[];bullets=[];explosions=[];spyPlane=null;
  gold=15;aiGold=15;timer=240;gameOver=false;
  goldAccum=0;aiGoldAccum=0;goldMineT=0;aiSpawnT=0;aiMoveT=0;aiStratTimer=0;accum=0;
  placing=null;placingIdx=-1;selected=null;dragStart=null;lastPointer=null;
  rallyPoint=null;rallyMode=false;
  SWIRL.active=false;SWIRL.zoneVisible=false;SWIRL.cancelled=false;
  document.getElementById("rallyBtn").classList.remove("active-rally");
  document.getElementById("rallyIndicator").innerHTML="📍<br>No rally";
  resetAnnouncerState();
  buildDeck();resize();
  // Short delay so voices are loaded before first line
  setTimeout(()=>announce("All units. Stand by. Battle commencing."),800);
}
init();
requestAnimationFrame(gameLoop);
</script>
